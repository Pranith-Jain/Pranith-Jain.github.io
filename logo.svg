<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Brand gradient -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3ee5"/>
      <stop offset="100%" style="stop-color:#435ef1"/>
    </linearGradient>
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with gradient -->
  <rect x="2" y="2" width="96" height="96" rx="20" ry="20" fill="url(#brandGradient)" filter="url(#glow)"/>

  <!-- Subtle inner highlight -->
  <rect x="6" y="6" width="88" height="88" rx="16" ry="16" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

  <!-- PJ Text -->
  <text x="50" y="68" font-family="Poppins, Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="52" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">PJ</text>
</svg>