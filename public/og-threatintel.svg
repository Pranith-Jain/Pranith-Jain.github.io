<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!--
    /threatintel OG image. The platform's editorial pitch in one card:
    a working CTI surface on the edge, not a feature list. Headline
    deliberately echoes the DFIR card's "working / on the edge" framing
    so the family resemblance is obvious; the supporting line + stats
    + footer all reflect the CTI-specific story (correlation, ransomware
    depth, authored research cadence). Visual chassis shared with the
    portfolio OG; the LIVE-AT chip uses a rose-tinted accent on the
    label to evoke threat-data context without leaving the brand palette.
  -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c3ee5"/>
      <stop offset="100%" stop-color="#435ef1"/>
    </linearGradient>
    <linearGradient id="brandText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#7c8fff"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#e11d48" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#e11d48" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g stroke="#1e293b" stroke-width="1" opacity="0.6">
    <path d="M0 157 L1200 157 M0 315 L1200 315 M0 472 L1200 472"/>
    <path d="M300 0 L300 630 M600 0 L600 630 M900 0 L900 630"/>
  </g>

  <g transform="translate(80, 80)">
    <rect width="96" height="96" rx="20" fill="url(#brand)"/>
    <text x="48" y="62" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800" fill="white" text-anchor="middle">PJ</text>
  </g>

  <text x="200" y="125" font-family="ui-monospace, monospace" font-size="20" font-weight="700" fill="#94a3b8" letter-spacing="0.2em">PRANITH JAIN</text>
  <text x="200" y="155" font-family="ui-monospace, monospace" font-size="14" font-weight="500" fill="#64748b" letter-spacing="0.15em">/THREATINTEL · LIVE CTI PLATFORM</text>

  <text x="80" y="295" font-family="Inter, system-ui, sans-serif" font-size="68" font-weight="800" fill="#f1f5f9">A working CTI</text>
  <text x="80" y="370" font-family="Inter, system-ui, sans-serif" font-size="68" font-weight="800" fill="url(#brandText)">platform on the edge.</text>

  <text x="80" y="430" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="400" fill="#cbd5e1">Live ransomware feeds · IOC correlation across 18 sources · authored research</text>

  <g transform="translate(80, 490)" font-family="ui-monospace, monospace" font-weight="600">
    <g>
      <rect width="240" height="60" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="20" y="26" font-size="11" fill="#64748b" letter-spacing="0.15em">IOC FEEDS CORRELATED</text>
      <text x="20" y="50" font-size="22" fill="#f1f5f9">18</text>
    </g>
    <g transform="translate(260, 0)">
      <rect width="280" height="60" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="20" y="26" font-size="11" fill="#64748b" letter-spacing="0.15em">RANSOMWARE CLAIMS · 7d</text>
      <text x="20" y="50" font-size="22" fill="#f1f5f9">200+</text>
    </g>
    <g transform="translate(560, 0)">
      <rect width="220" height="60" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="20" y="26" font-size="11" fill="#64748b" letter-spacing="0.15em">AUTHORED RESEARCH</text>
      <text x="20" y="50" font-size="22" fill="#f1f5f9">3 PIECES</text>
    </g>
    <g transform="translate(800, 0)">
      <rect width="240" height="60" rx="10" fill="url(#brand)"/>
      <text x="20" y="26" font-size="11" fill="#fecdd3" letter-spacing="0.15em">OPEN AT</text>
      <text x="20" y="50" font-size="20" fill="white">/threatintel</text>
    </g>
  </g>

  <line x1="80" y1="595" x2="1120" y2="595" stroke="#1e293b" stroke-width="1"/>
  <text x="80" y="615" font-family="ui-monospace, monospace" font-size="12" fill="#475569">/correlation · /detections · /metrics · /ransomware-activity · /research · /breach-disclosures</text>
</svg>
