<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetDraw — Network Diagrams</title>
<style>
  @font-face{font-family:'Hanken Grotesk';font-style:normal;font-weight:400 700;font-display:swap;src:url(/fonts/hanken-grotesk-latin-e9201edd.woff2)format('woff2');}
  @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:400 500;font-display:swap;src:url(/fonts/jetbrains-mono-latin-83c005d4.woff2)format('woff2');}
  @font-face{font-family:'Bricolage Grotesque';font-style:normal;font-weight:600 800;font-display:swap;src:url(/fonts/bricolage-grotesque-latin-a79fdb52.woff2)format('woff2');}
  :root{
    --bg:#070b1c; --panel:#0c1124; --panel2:#12192e; --panel3:#1c253c; --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14);
    --text:#f1f5f9; --muted:#94a3b8; --faint:#64748b;
    --accent:#435ef1; --accent2:#6d8bf7; --card:#0c1124;
    --font-sans:'Hanken Grotesk',system-ui,sans-serif;
    --font-display:'Bricolage Grotesque',system-ui,sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; overflow:hidden;}
  body{
    background:var(--bg); color:var(--text);
    font-family:var(--font-sans);
    font-size:13px; user-select:none; -webkit-user-select:none;
  }
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:-1;background:radial-gradient(ellipse 80% 60%at 50% -20%,rgba(67,94,241,0.12),transparent);}
  #app{display:flex; flex-direction:column; height:100%;}

  /* ---------- top bar ---------- */
  #topbar{
    height:52px; flex:0 0 52px; display:flex; align-items:center; gap:10px;
    padding:0 14px; background:var(--panel); border-bottom:1px solid var(--border);
  }
  #logo{display:flex; align-items:center; gap:9px; font-weight:700; font-size:15px; letter-spacing:.2px; margin-right:6px; font-family:var(--font-display);}
  #logo svg{display:block;}
  #logo .sub{font-size:10.5px; font-weight:500; color:var(--faint); margin-left:2px; margin-top:3px;}
  .tgroup{display:flex; align-items:center; gap:3px; padding:3px; background:var(--panel2); border:1px solid var(--border); border-radius:10px;}
  .sep{width:1px; height:24px; background:var(--border); margin:0 4px;}
  button{
    font-family:inherit; font-size:12.5px; color:var(--muted); background:transparent;
    border:none; border-radius:7px; height:30px; min-width:30px; padding:0 8px;
    display:inline-flex; align-items:center; justify-content:center; gap:6px; cursor:pointer;
    white-space:nowrap; transition:background .12s, color .12s, border-color .12s;
  }
  button:hover{background:rgba(255,255,255,.05); color:var(--text);}
  button:active{transform:translateY(0.5px);}
  button.active{background:rgba(67,94,241,.15); color:var(--accent);}
  button:disabled{opacity:.35; cursor:default; background:transparent; color:var(--muted);}
  button svg{display:block; flex:0 0 auto;}
  #zoomPct{min-width:52px; font-variant-numeric:tabular-nums;}
  .spacer{flex:1;}
  .btn-text{font-weight:600;}

  /* ---------- main ---------- */
  #main{flex:1; display:flex; min-height:0; position:relative;}

  /* ---------- palette ---------- */
  #palette{
    width:212px; flex:0 0 212px; background:var(--panel); border-right:1px solid var(--border);
    overflow-y:auto; padding:12px 10px 24px;
  }
  #palette::-webkit-scrollbar{width:8px;}
  #palette::-webkit-scrollbar-track{background:transparent;}
  #palette::-webkit-scrollbar-thumb{background:var(--panel3); border-radius:4px;}
  .pgroup{margin-bottom:14px;}
  .pgroup h3{
    font-size:10.5px; text-transform:uppercase; letter-spacing:1.1px; color:var(--faint);
    font-weight:700; padding:4px 6px 8px;
  }
  .pitems{display:grid; grid-template-columns:1fr 1fr; gap:7px;}
  .pitem{
    background:var(--panel2); border:1px solid var(--border); border-radius:10px;
    padding:10px 4px 8px; display:flex; flex-direction:column; align-items:center; gap:7px;
    cursor:grab; transition:border-color .12s, background .12s;
  }
  .pitem:hover{border-color:var(--border2); background:var(--panel3);}
  .pitem:active{cursor:grabbing;}
  .pitem .pic{width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center;}
  .pitem .pname{font-size:11px; color:var(--muted); font-weight:500;}
  #dragGhost{
    position:fixed; z-index:100; pointer-events:none; display:none;
    background:var(--card); border:1px solid var(--border2); border-radius:12px;
    padding:10px 16px; align-items:center; gap:9px;
    box-shadow:0 10px 30px rgba(0,0,0,.5); font-size:12px; color:var(--text); font-weight:600;
  }

  /* ---------- canvas ---------- */
  #canvasWrap{flex:1; position:relative; min-width:0; background:var(--bg);}
  #canvas{position:absolute; inset:0; width:100%; height:100%; display:block; outline:none;}
  #canvas.tool-select{cursor:default;}
  #canvas.tool-connect{cursor:crosshair;}
  #canvas.tool-zone{cursor:crosshair;}
  #canvas.tool-lane{cursor:crosshair;}
  g.zoneg{cursor:move;}
  .lanerow{display:flex; gap:5px; margin-bottom:5px;}
  .lanerow input{flex:1; min-width:0;}
  .lanedel{flex:0 0 26px; background:var(--panel2); border:1px solid var(--border); color:var(--faint); height:29px;}
  .lanedel:hover{color:#fda4af; border-color:#58202f;}
  #laneAdd{width:100%; justify-content:center; background:var(--panel2); border:1px solid var(--border); margin-top:2px;}
  #canvas.tool-pan{cursor:grab;}
  #canvas.panning{cursor:grabbing !important;}

  g.nodeg{cursor:move;}
  #canvas.tool-connect g.nodeg{cursor:crosshair;}
  .ports{opacity:0; transition:opacity .13s;}
  g.nodeg:hover .ports{opacity:1;}
  .port{cursor:crosshair;}
  .port:hover{stroke-width:2.5;}
  .edge{cursor:pointer;}
  .edge:hover .vis{stroke:#94a3b8;}
  .edge.sel .vis{stroke:var(--accent);}
  .vis.anim{animation:dashflow .8s linear infinite;}
  @keyframes dashflow{to{stroke-dashoffset:-28;}}
  .fxhalo{animation:fxpulse 1.6s ease-in-out infinite;}
  @keyframes fxpulse{0%,100%{stroke-opacity:.22;}50%{stroke-opacity:.85;}}
  text{pointer-events:none;}
  .edge text{pointer-events:none;}

  /* ---------- props panel ---------- */
  #props{
    position:absolute; top:14px; right:14px; width:230px; display:none;
    background:rgba(12,17,36,.92); backdrop-filter:blur(12px);
    border:1px solid var(--border); border-radius:12px; padding:14px;
    box-shadow:0 14px 40px rgba(0,0,0,.45);
  }
  #props h4{font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--faint); margin-bottom:10px; font-weight:700;}
  #props .row{margin-bottom:10px;}
  #props label{display:block; font-size:11px; color:var(--muted); margin-bottom:5px;}
  #props input[type=text], #props select, #props textarea{
    width:100%; background:var(--panel2); border:1px solid var(--border); color:var(--text);
    border-radius:8px; padding:7px 9px; font-size:12.5px; font-family:inherit; outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  #props textarea{resize:vertical; min-height:44px; line-height:1.45;}
  #props input[type=text]:focus, #props select:focus, #props textarea:focus{border-color:var(--accent2); box-shadow:0 0 0 3px rgba(67,94,241,.15);}
  .swatches{display:flex; gap:6px; flex-wrap:wrap;}
  .sw{width:22px; height:22px; border-radius:7px; cursor:pointer; border:2px solid transparent;}
  .sw.on{border-color:var(--accent);}
  .checkrow{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); cursor:pointer;}
  .fxchips{display:flex; flex-wrap:wrap; gap:5px;}
  .fxchip{
    border:1px solid var(--border); border-radius:99px; padding:3px 9px;
    font-size:10.5px; color:var(--muted); cursor:pointer; transition:border-color .1s, background .1s;
  }
  .fxchip:hover{border-color:var(--border2); color:var(--text);}
  .fxchip.on{background:rgba(67,94,241,.12); border-color:var(--accent); color:var(--accent2);}
  #props .danger{width:100%; justify-content:center; background:#3a1622; color:#fda4af; border:1px solid #58202f; margin-top:2px;}
  #props .danger:hover{background:#4c1b2b;}

  /* ---------- hint bar ---------- */
  #hintbar{
    position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
    background:rgba(12,17,36,.85); backdrop-filter:blur(12px); border:1px solid var(--border); border-radius:99px;
    padding:6px 16px; font-size:11px; color:var(--faint); pointer-events:none; white-space:nowrap;
  }
  #hintbar b{color:var(--muted); font-weight:600;}

  /* ---------- floating label editor ---------- */
  #labelEditor{
    position:absolute; display:none; z-index:50; width:150px; text-align:center;
    background:var(--card); border:1px solid var(--accent); color:var(--text); border-radius:7px;
    padding:5px 8px; font-size:12px; font-family:inherit; outline:none;
    box-shadow:0 6px 20px rgba(0,0,0,.5); caret-color:var(--accent);
  }
  #labelEditor:focus{box-shadow:0 6px 20px rgba(0,0,0,.5), 0 0 0 3px rgba(67,94,241,.12);}
  #watermark{
    position:absolute; bottom:8px; right:14px; z-index:45; pointer-events:none;
    font-size:10.5px; letter-spacing:.3px; color:var(--faint); opacity:.55;
    text-shadow:0 1px 2px rgba(4,8,16,.6);
  }
  #toast{
    position:absolute; top:16px; left:50%; transform:translateX(-50%); z-index:60;
    background:rgba(28,37,60,.92); backdrop-filter:blur(12px); border:1px solid var(--accent); color:var(--text); border-radius:10px;
    padding:8px 16px; font-size:12px; display:none;
  }

  /* ---------- record modal ---------- */
  #recModal{
    position:absolute; inset:0; z-index:150; display:none;
    align-items:center; justify-content:center;
    background:rgba(4,8,16,.55); backdrop-filter:blur(6px);
  }
  #recModal.open{display:flex;}
  .mbox{
    width:330px; background:var(--panel); border:1px solid var(--border2);
    border-radius:16px; padding:20px; box-shadow:0 24px 80px rgba(0,0,0,.6);
  }
  .mbox h3{font-size:14px; margin-bottom:6px;}
  .mnote{font-size:11.5px; color:var(--faint); margin-bottom:12px; line-height:1.5;}
  .msub{font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--faint); font-weight:700; margin:10px 0 2px;}
  .mopt{display:flex; align-items:center; gap:8px; padding:6px 4px; font-size:12.5px; color:var(--muted); cursor:pointer;}
  .mopt .mdim{color:var(--faint); font-size:11px;}
  .mopt input[type=file]{font-size:11px; color:var(--faint); max-width:150px;}
  .mbtns{display:flex; gap:8px; margin-top:14px;}
  .mbtns button{flex:1; background:var(--panel2); border:1px solid var(--border); justify-content:center;}
  #recStart{background:#57181f; color:#fda4af; border-color:#7c2531; font-weight:600;}
  #recStart:hover{background:#6b1d26;}
  #btnRec.recon{background:#57181f; color:#fda4af; font-weight:600;}
  #btnRec.recon:hover{background:#6b1d26;}

  /* ---------- examples dropdown ---------- */
  .menuwrap{position:relative;}
  #examplesMenu{
    position:absolute; top:38px; right:0; z-index:130; display:none; width:280px;
    background:rgba(12,17,36,.94); backdrop-filter:blur(12px); border:1px solid var(--border2); border-radius:12px; padding:6px;
    box-shadow:0 16px 44px rgba(0,0,0,.55);
  }
  .exitem{
    width:100%; justify-content:space-between; height:34px; padding:0 10px; border-radius:8px;
    font-size:12.5px; color:var(--text); background:transparent; text-align:left;
  }
  .exitem:hover{background:rgba(255,255,255,.05);}
  .extag{font-size:9.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--accent2); background:rgba(67,94,241,.12); border:1px solid var(--accent); border-radius:99px; padding:1px 7px;}

  /* ---------- journey panel ---------- */
  #journey{
    position:absolute; top:14px; right:14px; width:250px; display:none; z-index:40;
    max-height:calc(100% - 28px); overflow-y:auto;
    background:rgba(12,17,36,.94); backdrop-filter:blur(12px);
    border:1px solid var(--border); border-radius:12px; padding:14px;
    box-shadow:0 14px 40px rgba(0,0,0,.45);
  }
  #journey::-webkit-scrollbar{width:8px;} #journey::-webkit-scrollbar-thumb{background:var(--panel3); border-radius:4px;}
  #journey h4{font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--faint); margin-bottom:8px; font-weight:700;}
  .jhint{font-size:11px; color:var(--faint); line-height:1.5; margin-bottom:10px;}
  .jempty{font-size:12px; color:var(--faint); padding:8px 0;}
  .jstep{background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:8px; margin-bottom:7px;}
  .jhead{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
  .jhead b{font-size:12px;} .jcount{font-size:9.5px; color:var(--faint);}
  .jnote{width:100%; background:var(--panel2); border:1px solid var(--border); color:var(--text); border-radius:7px; padding:6px 8px; font-size:12px; font-family:inherit; outline:none; margin-bottom:6px;}
  .jnote:focus{border-color:var(--accent2); box-shadow:0 0 0 3px rgba(67,94,241,.15);}
  .jbtns{display:flex; flex-wrap:wrap; gap:4px; align-items:center;}
  .jbtns button{height:26px; min-width:26px; padding:0 7px; font-size:11px; background:var(--panel2); border:1px solid var(--border); color:var(--muted); border-radius:6px;}
  .jbtns button:hover{background:rgba(255,255,255,.05); color:var(--text);}
  .jbtns .jset{flex:1;}
  .jbtns .danger{color:#fda4af; border-color:#58202f;}
  .jfocus{display:flex; align-items:center; gap:4px; font-size:11px; color:var(--muted); cursor:pointer;}
  #jAdd{width:100%; justify-content:center; background:var(--panel2); border:1px solid var(--border); margin-top:4px;}
  #jPlay.jprimary{width:100%; justify-content:center; background:rgba(67,94,241,.12); color:var(--accent2); border:1px solid var(--accent); margin-top:6px; font-weight:600;}
  #jPlay.jprimary:hover{background:rgba(67,94,241,.2); color:var(--accent2);}

  /* ---------- present mode ---------- */
  body.presenting #palette, body.presenting #topbar .tgroup, body.presenting #hintbar, body.presenting #journey{ display:none !important; }
  body.presenting #topbar{ justify-content:center; }
  body.presenting #logo{ margin:0; }
  #presentBar{
    position:absolute; bottom:20px; left:50%; transform:translateX(-50%); z-index:120; display:none;
    align-items:center; gap:10px; max-width:min(760px, 92%);
    background:rgba(12,17,36,.94); backdrop-filter:blur(12px);
    border:1px solid var(--border2); border-radius:12px; padding:10px 14px;
    box-shadow:0 16px 50px rgba(0,0,0,.55);
  }
  #presentBar button{height:32px; padding:0 12px; background:var(--panel2); border:1px solid var(--border); color:var(--text); border-radius:9px; font-weight:600; transition:background .12s;}
  #presentBar button:hover{background:rgba(255,255,255,.05);}
  #presentBar button:disabled{opacity:.35;}
  #pjExit{min-width:32px; padding:0; color:#fda4af;}
  #pjCounter{font-size:12px; color:var(--faint); font-variant-numeric:tabular-nums; white-space:nowrap;}
  #pjCaption{font-size:13.5px; color:var(--text); line-height:1.4; padding-left:6px; border-left:1px solid var(--border2); margin-left:2px;}
  #pjCaption:empty{display:none;}
  #btnRec.recon svg{animation:recblink 1.1s step-end infinite;}
  @keyframes recblink{50%{opacity:.35;}}
</style>
</head>
<body>
<div id="app">
  <header id="topbar">
    <div id="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round">
        <circle cx="5" cy="6" r="2.6"/><circle cx="19" cy="6" r="2.6"/><circle cx="12" cy="18" r="2.6"/>
        <path d="M7 7.5 10.5 16M17 7.5 13.5 16M7.6 6h8.8"/>
      </svg>
      NetDraw <span class="sub">network diagrams</span>
    </div>

    <div class="tgroup">
      <button id="toolSelect" title="Select / Move  (V)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"><path d="M5 3l14 8.5-6.2 1.4L9.5 19z"/></svg>
      </button>
      <button id="toolConnect" title="Connect  (C)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="5.5" cy="18.5" r="2.8"/><circle cx="18.5" cy="5.5" r="2.8"/><path d="M7.6 16.4 16.4 7.6"/></svg>
      </button>
      <button id="toolZone" title="Draw zone / network segment  (Z)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><rect x="3.5" y="5" width="17" height="14" rx="3.5" stroke-dasharray="4.2 3.2"/></svg>
      </button>
      <button id="toolLane" title="Draw swimlane — cross-functional lanes  (L)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3.5" y="4.5" width="17" height="15" rx="2"/><path d="M3.5 9.7h17M3.5 14.6h17M7.8 4.5v15"/></svg>
      </button>
      <button id="toolPan" title="Pan  (H, or hold Space)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M7 11V5.5a1.5 1.5 0 0 1 3 0V10m0-5.5a1.5 1.5 0 0 1 3 0V10m0-4a1.5 1.5 0 0 1 3 0v5m0-2.5a1.5 1.5 0 0 1 3 0V15a6 6 0 0 1-6 6h-1.8a6 6 0 0 1-4.9-2.6L4.6 15c-.9-1.3-.4-2.8 1-3.2.9-.2 1.8.2 2.3 1l.9 1.4"/></svg>
      </button>
    </div>

    <div class="tgroup">
      <button id="btnUndo" title="Undo  (Ctrl+Z)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 5 4 9.5 8.5 14"/><path d="M4 9.5h10a6 6 0 0 1 0 12h-3"/></svg>
      </button>
      <button id="btnRedo" title="Redo  (Ctrl+Y)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M15.5 5 20 9.5 15.5 14"/><path d="M20 9.5H10a6 6 0 0 0 0 12h3"/></svg>
      </button>
    </div>

    <div class="tgroup">
      <button id="btnZoomOut" title="Zoom out">−</button>
      <button id="zoomPct" title="Reset zoom to 100%">100%</button>
      <button id="btnZoomIn" title="Zoom in">+</button>
      <button id="btnFit" title="Fit diagram  (F)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M3 8V5a2 2 0 0 1 2-2h3M16 3h3a2 2 0 0 1 2 2v3M21 16v3a2 2 0 0 1-2 2h-3M8 21H5a2 2 0 0 1-2-2v-3"/></svg>
      </button>
    </div>

    <div class="tgroup">
      <button id="btnGrid" class="active" title="Toggle grid">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
      </button>
      <button id="btnSnap" class="active" title="Toggle snap (grid + swimlane lanes)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M5 3v8a7 7 0 0 0 14 0V3"/><path d="M5 3h4M15 3h4"/></svg>
      </button>
    </div>

    <div class="spacer"></div>

    <div class="tgroup">
      <button id="btnPNG" class="btn-text" title="Export as PNG image">PNG</button>
      <button id="btnSVG" class="btn-text" title="Export as SVG vector">SVG</button>
      <button id="btnGIF" class="btn-text" title="Export animated GIF (seamless 1.6 s loop)">GIF</button>
      <button id="btnJSON" class="btn-text" title="Save diagram as JSON file (Ctrl+S)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v11m0 0-4-4m4 4 4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
        Save
      </button>
      <button id="btnOpen" class="btn-text" title="Open diagram JSON file">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 14V3m0 0L8 7m4-4 4 4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
        Open
      </button>
      <div class="menuwrap">
        <button id="btnExamples" class="btn-text" title="Load a bundled example diagram">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5.5h9M4 10h9M4 14.5h6"/><path d="m15.5 13 2.5 2.5 4-5"/></svg>
          Examples ▾
        </button>

const SVGNS = "http://www.w3.org/2000/svg";
function el(tag, attrs){ const e = document.createElementNS(SVGNS, tag); for(const k in attrs) e.setAttribute(k, attrs[k]); return e; }
function uid(p){ return p + Math.random().toString(36).slice(2, 9); }
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function nodeById(id){ return state.nodes.find(n => n.id === id); }
function edgeById(id){ return state.edges.find(e => e.id === id); }

function snap(v){ return snapOn ? Math.round(v / SNAP) * SNAP : v; }
function inZone(n, z){ return n.x > z.x && n.x < z.x + z.w && n.y > z.y && n.y < z.y + z.h; }

/* Lane snap: inside a swimlane, pull the cross-axis coordinate onto the nearest
   lane centreline when within LANE_SNAP px. Returns the (possibly adjusted) point
   plus the lane rect for drag highlighting when it snapped. */
const LANE_SNAP = 22;
function laneSnapPoint(x, y){
  if(!snapOn) return {x, y};
  for(const z of state.zones){
    if(z.kind !== "swimlane" || !z.lanes || !z.lanes.length) continue;
    if(x <= z.x || x >= z.x + z.w || y <= z.y + LANE_TITLE_H || y >= z.y + z.h) continue;
    const nl = z.lanes.length;
    if(z.orient !== "v"){
      const laneH = (z.h - LANE_TITLE_H) / nl;
      const i = clamp(Math.floor((y - z.y - LANE_TITLE_H) / laneH), 0, nl - 1);
      const cy = z.y + LANE_TITLE_H + (i + 0.5) * laneH;
      if(Math.abs(y - cy) < LANE_SNAP)
        return {x, y:cy, lane:{color:z.color, x:z.x + LANE_HEAD, y:z.y + LANE_TITLE_H + i * laneH, w:z.w - LANE_HEAD, h:laneH}};
      return {x, y};
    } else {
      const laneW = z.w / nl;
      const i = clamp(Math.floor((x - z.x) / laneW), 0, nl - 1);
      const cx = z.x + (i + 0.5) * laneW;
      if(Math.abs(x - cx) < LANE_SNAP)
        return {x:cx, y, lane:{color:z.color, x:z.x + i * laneW, y:z.y + LANE_TITLE_H + LANE_HEAD, w:laneW, h:z.h - LANE_TITLE_H - LANE_HEAD}};
      return {x, y};
    }
  }
  return {x, y};
}

/* metadata lines shown under the label (schema-driven, notes stay panel-only); card grows to fit.
   Flow shapes render the label centred inside the shape and show no meta lines. */
function metaLines(n){
  const T = TYPES[n.type];
  if(T.shape) return [];
  return (T.fields || []).filter(f => f !== "notes" && n[f]).map(f => String(n[f])).slice(0, 3);
}
function nodeW(n){
  const T = TYPES[n.type];
  if(T.shape){
    const L = n.label.length;
    if(T.shape === "connector") return clamp(L * 3.6 + 16, 23, 60) * 2;
    let w = L * 7 + 44;
    if(T.shape === "decision") w = L * 7.5 + 70;
    if(T.shape === "data" || T.shape === "manual") w += 26;
    return clamp(w, 96, 290);
  }
  const need = Math.max(NW, n.label.length * 6.8 + 24, ...metaLines(n).map(s => s.length * 5.9 + 26));
  return clamp(need, NW, 240);
}
function nodeH(n){
  const T = TYPES[n.type];
  if(T.shape){
    if(T.shape === "connector") return nodeW(n);
    if(T.shape === "decision") return 76;
    if(T.shape === "document") return 62;
    return 54;
  }
  return NH + metaLines(n).length * 12.5;
}

/* ---------- view transform ---------- */
function applyView(){
  worldG.setAttribute("transform", `translate(${view.x} ${view.y}) scale(${view.k})`);
  const pat = $("gridPat");
  pat.setAttribute("patternTransform", `translate(${view.x} ${view.y}) scale(${view.k})`);
  $("zoomPct").textContent = Math.round(view.k * 100) + "%";
  saveSoon();
}
function toWorld(cx, cy){
  const r = svg.getBoundingClientRect();
  return {x:(cx - r.left - view.x) / view.k, y:(cy - r.top - view.y) / view.k};
}
function toScreen(wx, wy){
  return {x: wx * view.k + view.x, y: wy * view.k + view.y};
}

function iconSVGString(type, color, size){

function nodeEffects(n){ return (n.effects || []).filter(k => EFFECTS[k]); }

function renderNode(n){
  const W = nodeW(n), H = nodeH(n);
  const g = el("g", {class:"nodeg", "data-node":n.id, transform:`translate(${n.x - W/2},${n.y - H/2})`});

    const worst = fx.reduce((a, k) => EFFECTS[k].sev > EFFECTS[a].sev ? k : a, fx[0]);
    g.appendChild(el("rect", {class:"fxhalo", x:-4, y:-4, width:W+8, height:H+8, rx:17, fill:"none",
      stroke:EFFECTS[worst].color, "stroke-width":2.2, "stroke-opacity":.6}));

  if(sel) g.appendChild(el("rect", {x:-5, y:-5, width:W+10, height:H+10, rx:18, fill:"none", stroke:acc, "stroke-opacity":.4, "stroke-width":1.6}));
  const T = TYPES[n.type];
  if(T.shape){
    const attrs = {class:"card", fill:"url(#cardGrad)", stroke:acc,
      "stroke-opacity": sel ? 1 : .7, "stroke-width": sel ? 1.8 : 1.4, filter:"url(#nodeShadow)"};
    let body;
    switch(T.shape){
      case "terminator": body = el("rect", {...attrs, width:W, height:H, rx:H/2}); break;
      case "process":    body = el("rect", {...attrs, width:W, height:H, rx:9}); break;
      case "predefined": body = el("rect", {...attrs, width:W, height:H, rx:6}); break;
      case "decision":   body = el("polygon", {...attrs, points:`${W/2},0 ${W},${H/2} ${W/2},${H} 0,${H/2}`}); break;
      case "data":       body = el("polygon", {...attrs, points:`20,0 ${W},0 ${W-20},${H} 0,${H}`}); break;
      case "prep":       body = el("polygon", {...attrs, points:`14,0 ${W-14},0 ${W},${H/2} ${W-14},${H} 14,${H} 0,${H/2}`}); break;
      case "manual":     body = el("polygon", {...attrs, points:`0,12 ${W},0 ${W},${H} 0,${H}`}); break;
      case "delay":      body = el("path", {...attrs, d:`M0 0 H ${W - H/2} A ${H/2} ${H/2} 0 0 1 ${W - H/2} ${H} H 0 Z`}); break;
      case "document":   body = el("path", {...attrs, d:`M0 0 H ${W} V ${H-10} C ${W*0.7} ${H-22}, ${W*0.3} ${H+10}, 0 ${H-8} Z`}); break;
      case "connector":  body = el("circle", {...attrs, cx:W/2, cy:H/2, r:W/2}); break;

    g.appendChild(body);
    if(T.shape === "predefined"){
      g.appendChild(el("path", {d:`M10 0 V ${H} M ${W-10} 0 V ${H}`, stroke:acc, "stroke-opacity":.5, "stroke-width":1.2, fill:"none"}));

    t.textContent = n.label;
    g.appendChild(t);
  } else {
    const card = el("rect", {class:"card", width:W, height:H, rx:14, fill:"url(#cardGrad)",
      stroke: sel ? acc : (isThreat ? "rgba(248,113,113,.4)" : "rgba(148,163,184,.20)"),
      "stroke-width": sel ? 1.6 : 1, filter:"url(#nodeShadow)"});
    if(isThreat && !sel) card.setAttribute("stroke-dasharray", "5 3.5");
    g.appendChild(card);
    g.appendChild(el("rect", {x:W/2 - 19, y:8, width:38, height:38, rx:11, fill:acc, opacity:.13}));
    const ig = el("g", {transform:`translate(${W/2 - 13.8},${13.2}) scale(1.15)`,
      fill:"none", stroke:acc, "stroke-width":1.8, "stroke-linecap":"round", "stroke-linejoin":"round", color:acc});
    ig.innerHTML = ICONS[n.type];
    g.appendChild(ig);
    const t = el("text", {x:W/2, y:62, "text-anchor":"middle", "font-size":11.5, "font-weight":600, fill:"#f1f5f9"});
    t.textContent = n.label;
    g.appendChild(t);
    metaLines(n).forEach((s, i) => {
      const m = el("text", {x:W/2, y:75 + i * 12.5, "text-anchor":"middle", "font-size":9.5, fill:"#94a3b8",
        "font-family":"ui-monospace, Consolas, monospace"});
      m.textContent = s;
      g.appendChild(m);
    });
  }
  // disposition tag on the top-left corner
  if(n.disp && DISPOSITIONS[n.disp]){
    const dd = DISPOSITIONS[n.disp];

    gi.innerHTML = f.icon;
    bg.appendChild(gi);

  if(fx.length > shownFx.length){
    const bx = W - 13 - shownFx.length * 23;

    bg.appendChild(el("circle", {cx:bx, cy:0, r:10.5, fill:"#0c1124", stroke:"#64748b", "stroke-width":1.6}));

}

function anchor(n, toward){
  const dx = toward.x - n.x, dy = toward.y - n.y;
  if(dx === 0 && dy === 0) return {x:n.x, y:n.y};
  const hw = (n.id ? nodeW(n) : NW)/2 + 5, hh = (n.id ? nodeH(n) : NH)/2 + 5;
  const s = Math.min(hw / Math.abs(dx || 1e-9), hh / Math.abs(dy || 1e-9));
  return {x: n.x + dx * s, y: n.y + dy * s};
}
function edgeGeom(a, b){
  const p1 = anchor(a, b), p2 = anchor(b, a);
  const dx = p2.x - p1.x, dy = p2.y - p1.y;
  let c1, c2;
  if(Math.abs(dx) >= Math.abs(dy)){ c1 = {x:p1.x + dx*.4, y:p1.y}; c2 = {x:p2.x - dx*.4, y:p2.y}; }
  else { c1 = {x:p1.x, y:p1.y + dy*.4}; c2 = {x:p2.x, y:p2.y - dy*.4}; }
  return {
    d:`M ${p1.x} ${p1.y} C ${c1.x} ${c1.y}, ${c2.x} ${c2.y}, ${p2.x} ${p2.y}`,
    mid:{x:(p1.x + 3*c1.x + 3*c2.x + p2.x)/8, y:(p1.y + 3*c1.y + 3*c2.y + p2.y)/8},
    p1, c1, c2, p2
  };
}
function dashFor(e){
  if(e.style === "dashed") return "8 6";
  if(e.style === "dotted") return "2 5";
  if(e.style === "sneakernet") return "1 9";
  return e.anim ? "6 8" : "";
}

/* ---------- sneakernet footprints (animated walk along an edge = air-gapped / manual transfer) ---------- */
const SNEAK_LOOP = 1.6;   // matches the GIF/animation loop so exports are seamless
const SNEAK_SPACINGS = 2; // footprint gaps advanced per loop — sets walk speed (even keeps the loop seamless)
function bezPoint(g, u){
  const m = 1 - u;
  return {
    x: m*m*m*g.p1.x + 3*m*m*u*g.c1.x + 3*m*u*u*g.c2.x + u*u*u*g.p2.x,
    y: m*m*m*g.p1.y + 3*m*m*u*g.c1.y + 3*m*u*u*g.c2.y + u*u*u*g.p2.y
  };
}
function bezAngle(g, u){
  const m = 1 - u;
  const dx = 3*m*m*(g.c1.x-g.p1.x) + 6*m*u*(g.c2.x-g.c1.x) + 3*u*u*(g.p2.x-g.c2.x);
  const dy = 3*m*m*(g.c1.y-g.p1.y) + 6*m*u*(g.c2.y-g.c1.y) + 3*u*u*(g.p2.y-g.c2.y);
  return Math.atan2(dy, dx) * 180 / Math.PI;
}
const sneakLUTs = new Map();   // arc-length lookup, keyed by control-point string
function getLUT(s){
  let l = sneakLUTs.get(s);
  if(!l){
    const n = s.split(",").map(Number);
    const g = {p1:{x:n[0],y:n[1]}, c1:{x:n[2],y:n[3]}, c2:{x:n[4],y:n[5]}, p2:{x:n[6],y:n[7]}};
    const pts = [{u:0, len:0}]; let len = 0, prev = bezPoint(g, 0);
    for(let i = 1; i <= 24; i++){ const u = i/24, p = bezPoint(g, u); len += Math.hypot(p.x-prev.x, p.y-prev.y); pts.push({u, len}); prev = p; }
    l = {g, pts, len};
    if(sneakLUTs.size > 400) sneakLUTs.clear();
    sneakLUTs.set(s, l);
  }
  return l;
}
function distToU(lut, d){
  d = ((d % lut.len) + lut.len) % lut.len;
  const pts = lut.pts;
  for(let i = 1; i < pts.length; i++)
    if(pts[i].len >= d){ const a = pts[i-1], b = pts[i]; return a.u + (b.u - a.u) * ((d - a.len) / ((b.len - a.len) || 1)); }
  return 1;
}
/* Position each footprint at time t (used live and when baking export frames).
   Each trail carries a direction (data-dir: 1 = a→b, -1 = b→a) and a base perpendicular
   offset (data-off) so the two directions walk in separate lanes above/below the line.
   The glyph points along +x, so rotating to the travel bearing makes each foot face the
   way it is walking (toward its arrowhead). */
const FOOT_GAIT = 1.3;   // small left/right stagger within a lane
function sneakStep(fsEl, t){
  const lut = getLUT(fsEl.getAttribute("data-g"));
  const K = +fsEl.getAttribute("data-k");
  const dir = +fsEl.getAttribute("data-dir");
  const base = +fsEl.getAttribute("data-off");
  const kids = fsEl.children;
  const spacing = lut.len / K;
  for(let j = 0; j < kids.length; j++){
    // advance a fixed number of foot-gaps per loop → constant slow pace regardless of edge length
    const dist = ((t / SNEAK_LOOP) * SNEAK_SPACINGS + j) * spacing * dir;
    const u = distToU(lut, dist);
    const p = bezPoint(lut.g, u);
    const a = bezAngle(lut.g, u);                 // bearing of a→b tangent
    const rad = a * Math.PI / 180;
    const off = base + (j % 2 ? FOOT_GAIT : -FOOT_GAIT);
    const x = p.x + (-Math.sin(rad)) * off, y = p.y + Math.cos(rad) * off;   // offset along the normal
    const face = dir > 0 ? a : a + 180;           // face the direction of travel
    kids[j].setAttribute("transform", `translate(${x.toFixed(1)} ${y.toFixed(1)}) rotate(${face.toFixed(1)})`);
  }
}
function buildFootsteps(geo){
  const gstr = [geo.p1.x, geo.p1.y, geo.c1.x, geo.c1.y, geo.c2.x, geo.c2.y, geo.p2.x, geo.p2.y].map(v => v.toFixed(1)).join(",");
  const lut = getLUT(gstr);
  const K = clamp(Math.round(lut.len / 46), 3, 14);
  const wrap = el("g", {class:"footwrap", "pointer-events":"none"});
  // two lanes: a→b sits above the line, b→a below it
  for(const [dir, base] of [[1, -5], [-1, 5]]){
    const fs = el("g", {class:"footsteps", "data-g":gstr, "data-k":K, "data-dir":dir, "data-off":base});
    for(let j = 0; j < K; j++){
      // footprint silhouette pointing +x: wide ball/toes at the front, smaller heel behind,
      // so once rotated to the travel bearing the toes clearly lead the direction of walk.
      const foot = el("g", {});
      foot.appendChild(el("ellipse", {cx:1.4, rx:2.2, ry:1.7, fill:"#fbbf24", opacity:.95}));   // ball + toes (front)
      foot.appendChild(el("ellipse", {cx:-2, cy:.15, rx:1.15, ry:1.25, fill:"#fbbf24", opacity:.95})); // heel (back)
      foot.appendChild(el("circle",  {cx:3.5, cy:-.9, r:.5, fill:"#fbbf24", opacity:.95}));      // big-toe hint
      fs.appendChild(foot);
    }
    sneakStep(fs, typeof performance !== "undefined" ? performance.now() / 1000 : 0);
    wrap.appendChild(fs);
  }
  return wrap;
}
let sneakTimer = null;
function ensureSneak(){
  const has = state.edges.some(e => e.style === "sneakernet");
  if(has && !sneakTimer){
    // setInterval, not rAF: keeps the walk moving even when the tab is unfocused (matches recording)
    sneakTimer = setInterval(() => {
      const t = performance.now() / 1000;
      edgesLayer.querySelectorAll(".footsteps").forEach(fs => sneakStep(fs, t));
    }, 33);
  } else if(!has && sneakTimer){
    clearInterval(sneakTimer); sneakTimer = null;
  }
}
function renderEdge(e){
  const a = nodeById(e.a), b = nodeById(e.b);
  if(!a || !b) return null;
  const geo = edgeGeom(a, b);
  const sel = selection.has(e.id);

  const sneak = e.style === "sneakernet";
  const vis = el("path", {class:"vis" + (e.anim && !sneak ? " anim" : ""), d:geo.d, fill:"none",
    stroke: sel ? "#435ef1" : (sneak ? "#92400e" : "#64748b"), "stroke-width": sel ? 2.4 : (sneak ? 1.5 : 2), "stroke-linecap":"round"});

  if(dash) vis.setAttribute("stroke-dasharray", dash);

  if(e.arrows === "both") vis.setAttribute("marker-start", "url(#arrow)");
  g.appendChild(vis);

  if(e.label){
    const w = e.label.length * 6.4 + 18;
    g.appendChild(el("rect", {x:geo.mid.x - w/2, y:geo.mid.y - 10, width:w, height:20, rx:9,

    const t = el("text", {x:geo.mid.x, y:geo.mid.y + 3.6, "text-anchor":"middle", "font-size":10.5, fill:"#94a3b8"});
    t.textContent = e.label;
    g.appendChild(t);
  }
  return g;
}

function addZoneHandles(g, z){
  for(const [cx, cy, c] of [[z.x,z.y,"nw"],[z.x+z.w,z.y,"ne"],[z.x,z.y+z.h,"sw"],[z.x+z.w,z.y+z.h,"se"]]){
    g.appendChild(el("rect", {class:"zhandle", "data-zhandle":c, x:cx-5, y:cy-5, width:10, height:10, rx:3,
      fill:"#0c1124", stroke:"#435ef1", "stroke-width":1.5,
      cursor: (c === "nw" || c === "se") ? "nwse-resize" : "nesw-resize"}));
  }
}
const LANE_TITLE_H = 26, LANE_HEAD = 22;
function renderSwimlane(z){
  const sel = selection.has(z.id);
  const col = z.color;
  const g = el("g", {class:"zoneg", "data-zone":z.id});
  const lanes = (z.lanes && z.lanes.length) ? z.lanes : ["Lane 1"];
  const n = lanes.length;
  g.appendChild(el("rect", {x:z.x, y:z.y, width:z.w, height:z.h, rx:10, fill:col, "fill-opacity":.03,
    stroke:col, "stroke-opacity": sel ? .95 : .55, "stroke-width": sel ? 2 : 1.4}));
  // title band (rounded to match the frame's top corners)
  g.appendChild(el("path", {fill:col, "fill-opacity":.13,
    d:`M ${z.x+10} ${z.y} H ${z.x+z.w-10} A 10 10 0 0 1 ${z.x+z.w} ${z.y+10} V ${z.y+LANE_TITLE_H} H ${z.x} V ${z.y+10} A 10 10 0 0 1 ${z.x+10} ${z.y} Z`}));
  const tt = el("text", {x:z.x + z.w/2, y:z.y + 17.5, "text-anchor":"middle", "font-size":12, "font-weight":700, fill:col});
  tt.textContent = z.label;
  g.appendChild(tt);
  const ly = z.y + LANE_TITLE_H, lh = z.h - LANE_TITLE_H;
  if(z.orient !== "v"){
    const laneH = lh / n;
    lanes.forEach((name, i) => {
      const ty = ly + i * laneH;
      if(i % 2 === 1) g.appendChild(el("rect", {x:z.x + LANE_HEAD, y:ty, width:z.w - LANE_HEAD, height:laneH, fill:col, "fill-opacity":.028}));
      g.appendChild(el("rect", {"data-lane":i, x:z.x, y:ty, width:LANE_HEAD, height:laneH, fill:col, "fill-opacity":.09}));
      const lt = el("text", {"text-anchor":"middle", "font-size":10.5, "font-weight":600, fill:"#94a3b8",
        transform:`translate(${z.x + LANE_HEAD/2 + 3.5},${ty + laneH/2}) rotate(-90)`});
      lt.textContent = name;
      g.appendChild(lt);
      if(i) g.appendChild(el("path", {d:`M ${z.x} ${ty} H ${z.x + z.w}`, stroke:col, "stroke-opacity":.3, "stroke-width":1}));
    });
    g.appendChild(el("path", {d:`M ${z.x + LANE_HEAD} ${ly} V ${z.y + z.h}`, stroke:col, "stroke-opacity":.3, "stroke-width":1}));
  } else {
    const laneW = z.w / n;
    lanes.forEach((name, i) => {
      const tx = z.x + i * laneW;
      if(i % 2 === 1) g.appendChild(el("rect", {x:tx, y:ly + LANE_HEAD, width:laneW, height:lh - LANE_HEAD, fill:col, "fill-opacity":.028}));
      g.appendChild(el("rect", {"data-lane":i, x:tx, y:ly, width:laneW, height:LANE_HEAD, fill:col, "fill-opacity":.09}));
      const lt = el("text", {x:tx + laneW/2, y:ly + 15, "text-anchor":"middle", "font-size":10.5, "font-weight":600, fill:"#94a3b8"});
      lt.textContent = name;
      g.appendChild(lt);
      if(i) g.appendChild(el("path", {d:`M ${tx} ${ly} V ${z.y + z.h}`, stroke:col, "stroke-opacity":.3, "stroke-width":1}));
    });
    g.appendChild(el("path", {d:`M ${z.x} ${ly + LANE_HEAD} H ${z.x + z.w}`, stroke:col, "stroke-opacity":.3, "stroke-width":1}));
  }
  if(sel) addZoneHandles(g, z);
  return g;
}
function renderZone(z){
  if(z.kind === "swimlane") return renderSwimlane(z);
  const sel = selection.has(z.id);
  const g = el("g", {class:"zoneg", "data-zone":z.id});
  g.appendChild(el("rect", {x:z.x, y:z.y, width:z.w, height:z.h, rx:16, fill:z.color, "fill-opacity":.055,
    stroke:z.color, "stroke-opacity": sel ? .95 : .5, "stroke-width": sel ? 2 : 1.4, "stroke-dasharray":"10 7"}));
  const tw = z.label.length * 6.6 + 22;
  g.appendChild(el("rect", {x:z.x + 14, y:z.y - 11, width:tw, height:22, rx:8,
    fill:"#0c1124", stroke:z.color, "stroke-opacity":.55, "stroke-width":1}));
  const t = el("text", {x:z.x + 14 + tw/2, y:z.y + 4, "text-anchor":"middle", "font-size":11, "font-weight":600, fill:z.color});
  t.textContent = z.label;
  g.appendChild(t);
  if(sel) addZoneHandles(g, z);
  return g;
}

/* presentation filter (set while a journey is playing); null = show everything */
let present = null, pjHidden = new Set(), pjOn = new Set(), pjHasHL = false;
function elemState(id){
  if(!present) return "on";
  if(pjHidden.has(id)) return "hidden";
  return pjOn.has(id) ? "on" : (pjHasHL ? "dim" : "on");
}
function dimGroup(g){
  g.setAttribute("opacity", ".13");
  g.style.pointerEvents = "none";
  g.querySelectorAll(".footwrap").forEach(x => x.remove());          // stop footstep walk on dimmed edges
  g.querySelectorAll(".vis.anim").forEach(x => x.classList.remove("anim"));
}
function renderAll(){
  zonesLayer.innerHTML = "";
  for(const z of state.zones){ const s = elemState(z.id); if(s === "hidden") continue; const g = renderZone(z); if(s === "dim") dimGroup(g); zonesLayer.appendChild(g); }
  edgesLayer.innerHTML = "";
  for(const e of state.edges){
    if(elemState(e.a) === "hidden" || elemState(e.b) === "hidden") continue;
    const s = elemState(e.id);
    if(s === "hidden") continue;
    const g = renderEdge(e); if(!g) continue;
    if(s === "dim") dimGroup(g);
    edgesLayer.appendChild(g);
  }
  nodesLayer.innerHTML = "";
  for(const n of state.nodes){ const s = elemState(n.id); if(s === "hidden") continue; const g = renderNode(n); if(s === "dim") dimGroup(g); nodesLayer.appendChild(g); }
  updateProps();
  updateToolbar();
  ensureSneak();
}

/* ---------- journey / narration ---------- */
function jSteps(){ return (state.journey && state.journey.steps) || []; }
function boundsOf(ids){
  let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity, any = false;
  for(const id of ids){
    const n = nodeById(id);
    if(n){ const hw = nodeW(n)/2, hh = nodeH(n)/2; x0 = Math.min(x0, n.x-hw); x1 = Math.max(x1, n.x+hw); y0 = Math.min(y0, n.y-hh); y1 = Math.max(y1, n.y+hh); any = true; continue; }
    const z = zoneById(id);
    if(z){ x0 = Math.min(x0, z.x); x1 = Math.max(x1, z.x+z.w); y0 = Math.min(y0, z.y-14); y1 = Math.max(y1, z.y+z.h); any = true; }
  }
  return any ? {x0, y0, x1, y1} : null;
}
let viewTween = null;
function tweenView(tx, ty, tk, ms){
  if(viewTween) cancelAnimationFrame(viewTween);
  const s = {x:view.x, y:view.y, k:view.k}, t0 = performance.now();
  const ease = u => u < .5 ? 2*u*u : 1 - Math.pow(-2*u+2, 2)/2;
  const tick = () => {
    const u = Math.min(1, (performance.now()-t0)/ms), e = ease(u);
    view.x = s.x + (tx-s.x)*e; view.y = s.y + (ty-s.y)*e; view.k = s.k + (tk-s.k)*e;
    applyView();
    if(u < 1) viewTween = requestAnimationFrame(tick); else viewTween = null;
  };
  viewTween = requestAnimationFrame(tick);
}
function focusOnBounds(b, animate){
  if(!b) return;
  const pad = 80, r = svg.getBoundingClientRect();
  if(r.width < 10) return;
  const k = clamp(Math.min(r.width/(b.x1-b.x0+pad*2), r.height/(b.y1-b.y0+pad*2)), 0.2, 1.8);
  const tx = (r.width - (b.x0+b.x1)*k)/2, ty = (r.height - (b.y0+b.y1)*k)/2;
  if(animate) tweenView(tx, ty, k, 620); else { view.x = tx; view.y = ty; view.k = k; applyView(); }
}
function applyStep(k, animate){
  const steps = jSteps();
  if(!steps.length) return;
  k = clamp(k, 0, steps.length-1);
  present.step = k;
  const everShown = new Set(), shownSoFar = new Set();
  steps.forEach(s => (s.show||[]).forEach(id => everShown.add(id)));
  for(let i = 0; i <= k; i++) (steps[i].show||[]).forEach(id => shownSoFar.add(id));
  pjHidden = new Set([...everShown].filter(id => !shownSoFar.has(id)));
  const hl = new Set(steps[k].highlight || []);
  pjHasHL = hl.size > 0;
  pjOn = new Set(hl);
  state.edges.forEach(e => { if(hl.has(e.a) && hl.has(e.b)) pjOn.add(e.id); });   // light edges between highlighted nodes
  renderAll();
  if(steps[k].focus !== false){
    const b = boundsOf(hl.size ? [...hl] : [...shownSoFar]) || boundsOf(state.nodes.map(n=>n.id).filter(id=>!pjHidden.has(id)));
    focusOnBounds(b, animate);
  }
  $("pjCaption").innerHTML = esc(steps[k].note || "");
  $("pjCounter").textContent = (k+1) + " / " + steps.length;
  $("pjPrev").disabled = k === 0;
  $("pjNext").disabled = k === steps.length-1;
}
function enterPresent(fromStep){
  if(!jSteps().length){ toast("Add journey steps first"); return; }
  present = {step:0};
  selection.clear();
  document.body.classList.add("presenting");
  $("presentBar").style.display = "flex";
  applyStep(fromStep || 0, false);
}
function exitPresent(){
  if(!present) return;
  present = null; pjHidden = new Set(); pjOn = new Set(); pjHasHL = false;
  if(viewTween){ cancelAnimationFrame(viewTween); viewTween = null; }
  document.body.classList.remove("presenting");
  $("presentBar").style.display = "none";
  renderAll();
}
function pjNext(){ if(present && present.step < jSteps().length-1) applyStep(present.step+1, true); }
function pjPrev(){ if(present && present.step > 0) applyStep(present.step-1, true); }

/* authoring */
let journeyOpen = false;
function toggleJourney(){
  journeyOpen = !journeyOpen;
  $("journey").style.display = journeyOpen ? "block" : "none";
  $("btnJourney").classList.toggle("active", journeyOpen);
  if(journeyOpen){ propsEl.style.display = "none"; buildJourneyPanel(); }
}
function addStep(){
  const ids = [...selection];
  jSteps().push({note: ids.length ? "" : "Caption…", show: ids, highlight: ids, focus: true});
  commit(); buildJourneyPanel();
}
function buildJourneyPanel(){
  const steps = jSteps();
  const rows = steps.map((s, i) => `
    <div class="jstep" data-i="${i}">
      <div class="jhead"><b>Step ${i+1}</b><span class="jcount">${(s.highlight||[]).length} highlighted · ${(s.show||[]).length} shown</span></div>
      <input class="jnote" data-i="${i}" type="text" value="${esc(s.note||"")}" placeholder="Narration caption…">
      <div class="jbtns">
        <button class="jset" data-i="${i}" title="Set shown + highlighted from current selection">⤢ set from selection</button>
        <label class="jfocus"><input type="checkbox" class="jfoc" data-i="${i}" ${s.focus!==false?"checked":""}> focus</label>
        <button class="jup"  data-i="${i}" title="Move up">▲</button>
        <button class="jdn"  data-i="${i}" title="Move down">▼</button>
        <button class="jplay" data-i="${i}" title="Preview from here">▶</button>
        <button class="jdel danger" data-i="${i}" title="Delete step">✕</button>
      </div>
    </div>`).join("");
  $("journey").innerHTML = `
    <h4>Journey / narration</h4>
    <p class="jhint">Select objects on the canvas, then add a step. Each step reveals its objects and highlights them; earlier reveals stay visible.</p>
    <div class="jsteps">${rows || '<p class="jempty">No steps yet.</p>'}</div>
    <button id="jAdd">+ Add step from selection</button>
    <button id="jPlay" class="jprimary">▶ Play journey</button>`;
  $("jAdd").onclick = addStep;
  $("jPlay").onclick = () => enterPresent(0);
  $("journey").querySelectorAll(".jnote").forEach(inp => {
    inp.addEventListener("change", e => { steps[+inp.dataset.i].note = e.target.value; commit(); });
    inp.addEventListener("keydown", e => { e.stopPropagation(); if(e.key==="Enter") e.target.blur(); });
  });
  $("journey").querySelectorAll(".jset").forEach(b => b.onclick = () => { const s = steps[+b.dataset.i]; s.show = [...selection]; s.highlight = [...selection]; commit(); buildJourneyPanel(); });
  $("journey").querySelectorAll(".jfoc").forEach(b => b.onclick = () => { steps[+b.dataset.i].focus = b.checked; commit(); });
  $("journey").querySelectorAll(".jup").forEach(b => b.onclick = () => { const i = +b.dataset.i; if(i>0){ [steps[i-1],steps[i]]=[steps[i],steps[i-1]]; commit(); buildJourneyPanel(); } });
  $("journey").querySelectorAll(".jdn").forEach(b => b.onclick = () => { const i = +b.dataset.i; if(i<steps.length-1){ [steps[i+1],steps[i]]=[steps[i],steps[i+1]]; commit(); buildJourneyPanel(); } });
  $("journey").querySelectorAll(".jdel").forEach(b => b.onclick = () => { steps.splice(+b.dataset.i,1); commit(); buildJourneyPanel(); });
  $("journey").querySelectorAll(".jplay").forEach(b => b.onclick = () => enterPresent(+b.dataset.i));
}

/* ---------- history / persistence ---------- */
function serialize(){ return JSON.stringify(state); }
function commit(){
  undoStack.push(lastSnap);
  if(undoStack.length > 120) undoStack.shift();
  redoStack = [];
  lastSnap = serialize();
  updateToolbar();
  saveSoon();
}
function undo(){
  if(!undoStack.length) return;
  redoStack.push(serialize());
  state = JSON.parse(undoStack.pop());
  lastSnap = serialize();
  selection.clear(); renderAll(); saveSoon();
}
function redo(){
  if(!redoStack.length) return;
  undoStack.push(serialize());
  state = JSON.parse(redoStack.pop());
  lastSnap = serialize();
  selection.clear(); renderAll(); saveSoon();
}
let saveTimer = null;
function saveSoon(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try{ localStorage.setItem(LS_KEY, JSON.stringify({state, view})); }catch(_){}
  }, 300);
}
function updateToolbar(){
  $("btnUndo").disabled = !undoStack.length;
  $("btnRedo").disabled = !redoStack.length;
}

/* ---------- mutations ---------- */
function addNode(type, x, y, label){
  const ls = laneSnapPoint(snap(x), snap(y));
  const n = {id:uid("n"), type, x:ls.x, y:ls.y, label: label || TYPES[type].defaultLabel || TYPES[type].name};
  state.nodes.push(n);
  commit();
  selection = new Set([n.id]);
  renderAll();
  return n;
}
function addEdge(aId, bId){
  if(aId === bId) return;
  if(state.edges.some(e => (e.a === aId && e.b === bId) || (e.a === bId && e.b === aId))) return;
  const e = {id:uid("e"), a:aId, b:bId, label:"", style:"solid", anim:false, arrows:"none"};
  state.edges.push(e);
  commit();
  selection = new Set([e.id]);
  renderAll();
}
function deleteSelection(){
  if(!selection.size) return;
  state.nodes = state.nodes.filter(n => !selection.has(n.id));
  state.edges = state.edges.filter(e => !selection.has(e.id) && !selection.has(e.a) && !selection.has(e.b));
  state.zones = state.zones.filter(z => !selection.has(z.id));
  selection.clear();
  commit();
  renderAll();
}
function duplicateSelection(){
  const picked = state.nodes.filter(n => selection.has(n.id));
  const zPicked = state.zones.filter(z => selection.has(z.id));
  if(!picked.length && !zPicked.length) return;
  const map = {};
  const clones = picked.map(n => { const c = {...n, id:uid("n"), x:n.x + 30, y:n.y + 30}; map[n.id] = c.id; return c; });
  state.nodes.push(...clones);
  for(const e of state.edges.filter(e => map[e.a] && map[e.b]))
    state.edges.push({...e, id:uid("e"), a:map[e.a], b:map[e.b]});
  const zClones = zPicked.map(z => { const c = {...z, id:uid("z"), x:z.x + 30, y:z.y + 30}; return c; });
  state.zones.push(...zClones);
  commit();
  selection = new Set([...clones.map(c => c.id), ...zClones.map(c => c.id)]);
  renderAll();
}

/* ---------- palette ---------- */
function buildPalette(){
  const root = $("palette");
  for(const grp of PALETTE_GROUPS){
    const d = document.createElement("div");
    d.className = "pgroup";
    d.innerHTML = `<h3>${grp.title}</h3>`;
    const wrap = document.createElement("div");
    wrap.className = "pitems";
    for(const t of grp.items){
      const it = document.createElement("div");
      it.className = "pitem";
      it.dataset.type = t;
      it.title = "Drag onto canvas (or click to add)";
      it.innerHTML = `<div class="pic" style="background:${TYPES[t].accent}20">${iconSVGString(t, TYPES[t].accent, 21)}</div><div class="pname">${TYPES[t].name}</div>`;
      it.addEventListener("pointerdown", ev => startPaletteDrag(ev, t));
      wrap.appendChild(it);
    }
    d.appendChild(wrap);
    root.appendChild(d);
  }
}
function startPaletteDrag(ev, type){
  ev.preventDefault();
  const start = {x:ev.clientX, y:ev.clientY};
  let moved = false;
  ghost.innerHTML = `${iconSVGString(type, TYPES[type].accent, 18)}<span>${TYPES[type].name}</span>`;
  const move = e => {
    if(!moved && Math.hypot(e.clientX - start.x, e.clientY - start.y) > 5){
      moved = true; ghost.style.display = "flex";
    }
    if(moved){ ghost.style.left = (e.clientX + 12) + "px"; ghost.style.top = (e.clientY + 10) + "px"; }
  };
  const up = e => {
    window.removeEventListener("pointermove", move);
    window.removeEventListener("pointerup", up);
    ghost.style.display = "none";
    const r = svg.getBoundingClientRect();
    if(moved && e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom){
      const p = toWorld(e.clientX, e.clientY);
      addNode(type, p.x, p.y);
    } else if(!moved){
      const p = toWorld(r.left + r.width/2, r.top + r.height/2);
      addNode(type, p.x + (Math.random()*60 - 30), p.y + (Math.random()*60 - 30));
    }
  };
  window.addEventListener("pointermove", move);
  window.addEventListener("pointerup", up);
}

/* ---------- tools ---------- */
function setTool(t){
  tool = t;
  pendingFrom = null;
  clearTemp();
  svg.className.baseVal = "tool-" + t;
  $("toolSelect").classList.toggle("active", t === "select");
  $("toolConnect").classList.toggle("active", t === "connect");
  $("toolZone").classList.toggle("active", t === "zone");
  $("toolLane").classList.toggle("active", t === "lane");
  $("toolPan").classList.toggle("active", t === "pan");
}

/* ---------- temp edge / marquee ---------- */
function clearTemp(){ tempLayer.innerHTML = ""; uiLayer.innerHTML = ""; markLinkTarget(null); }
function drawTempEdge(fromNode, wp){
  tempLayer.innerHTML = "";
  const fake = {x:wp.x, y:wp.y};
  const geo = edgeGeom(fromNode, fake);
  tempLayer.appendChild(el("path", {d:geo.d, fill:"none", stroke:"#6d8bf7", "stroke-width":2,
    "stroke-dasharray":"6 6", "stroke-linecap":"round", opacity:.9}));
  tempLayer.appendChild(el("circle", {cx:wp.x, cy:wp.y, r:4, fill:"#6d8bf7"}));
}
let curLinkTarget = null;
function markLinkTarget(id){
  if(curLinkTarget === id) return;
  curLinkTarget = id;
  for(const g of nodesLayer.querySelectorAll("g.nodeg")){
    const card = g.querySelector(".card");
    const isTarget = g.getAttribute("data-node") === id;
    if(isTarget){ card.setAttribute("stroke", "#435ef1"); card.setAttribute("stroke-width", 2); }
  }
  if(id === null) renderAll();
}
function nodeUnderPointer(e){
  const t = document.elementFromPoint(e.clientX, e.clientY);
  const g = t && t.closest ? t.closest("g[data-node]") : null;
  return g ? g.getAttribute("data-node") : null;
}

/* ---------- canvas pointer handling ---------- */
svg.addEventListener("contextmenu", e => e.preventDefault());

// own double-click detection: pointer capture retargets native dblclick to the svg
let lastDown = {key:null, t:0, x:0, y:0};
function isDoubleClick(key, e){
  const now = performance.now();
  const dbl = lastDown.key === key && (now - lastDown.t) < 420 &&
              Math.hypot(e.clientX - lastDown.x, e.clientY - lastDown.y) < 8;
  lastDown = dbl ? {key:null, t:0, x:0, y:0} : {key, t:now, x:e.clientX, y:e.clientY};
  return dbl;
}

svg.addEventListener("pointerdown", e => {
  hideEditor();
  const wp = toWorld(e.clientX, e.clientY);

  // pan: middle / right button, space, or pan tool
  if(e.button === 1 || e.button === 2 || spaceDown || tool === "pan"){
    drag = {kind:"pan", sx:e.clientX, sy:e.clientY, vx:view.x, vy:view.y};
    svg.classList.add("panning");
    svg.setPointerCapture(e.pointerId);
    return;
  }
  if(e.button !== 0) return;
  if(present) return;   // no editing while presenting a journey (pan/zoom still allowed above)

  // zone / swimlane tool: drag out a new container anywhere
  if(tool === "zone" || tool === "lane"){
    drag = {kind:"zdraw", lane: tool === "lane", x0:wp.x, y0:wp.y, x1:wp.x, y1:wp.y};
    svg.setPointerCapture(e.pointerId);
    return;
  }

  const portEl = e.target.closest ? e.target.closest("[data-port]") : null;
  const nodeG = e.target.closest ? e.target.closest("g[data-node]") : null;
  const edgeG = e.target.closest ? e.target.closest("g[data-edge]") : null;
  const zHandle = e.target.closest ? e.target.closest("[data-zhandle]") : null;
  const zoneG = e.target.closest ? e.target.closest("g[data-zone]") : null;

  // pending click-click connect
  if(pendingFrom){
    const src = nodeById(pendingFrom);
    pendingFrom = null;
    clearTemp();
    if(nodeG && src) addEdge(src.id, nodeG.getAttribute("data-node"));
    return;
  }

  if(portEl){
    // drag out a new connection from a port
    const id = portEl.getAttribute("data-port");
    drag = {kind:"link", from:id};
    svg.setPointerCapture(e.pointerId);
    return;
  }

  if(nodeG){
    const id = nodeG.getAttribute("data-node");
    if(isDoubleClick("n:" + id, e)){ openEditor({kind:"node", id}); return; }
    if(tool === "connect"){
      drag = {kind:"link", from:id, clickClick:true, sx:e.clientX, sy:e.clientY};
      svg.setPointerCapture(e.pointerId);
      return;
    }
    if(e.shiftKey){
      selection.has(id) ? selection.delete(id) : selection.add(id);
      renderAll();
    } else if(!selection.has(id)){
      selection = new Set([id]);
      renderAll();
    }
    // begin move of all selected nodes
    const parts = state.nodes.filter(n => selection.has(n.id))
      .map(n => ({n, ox:n.x - wp.x, oy:n.y - wp.y}));
    drag = {kind:"move", parts, moved:false};
    svg.setPointerCapture(e.pointerId);
    return;
  }

  if(edgeG){
    const id = edgeG.getAttribute("data-edge");
    if(isDoubleClick("e:" + id, e)){ openEditor({kind:"edge", id}); return; }
    if(e.shiftKey){ selection.has(id) ? selection.delete(id) : selection.add(id); renderAll(); }
    else if(!(selection.size === 1 && selection.has(id))){ selection = new Set([id]); renderAll(); }
    return;
  }

  if(zHandle && zoneG){
    const z = zoneById(zoneG.getAttribute("data-zone"));
    const c = zHandle.getAttribute("data-zhandle");
    drag = {kind:"zresize", z,
      fx: c.includes("w") ? z.x + z.w : z.x,     // fixed (opposite) corner
      fy: c.includes("n") ? z.y + z.h : z.y,
      moved:false};
    svg.setPointerCapture(e.pointerId);
    return;
  }

  if(zoneG){
    const id = zoneG.getAttribute("data-zone");
    const laneEl = e.target.closest ? e.target.closest("[data-lane]") : null;
    if(laneEl){
      const li = +laneEl.getAttribute("data-lane");
      if(isDoubleClick("zl:" + id + ":" + li, e)){ openEditor({kind:"lane", id, lane:li}); return; }
    } else if(isDoubleClick("z:" + id, e)){ openEditor({kind:"zone", id}); return; }
    if(e.shiftKey){
      selection.has(id) ? selection.delete(id) : selection.add(id);
      renderAll();
    } else if(!selection.has(id)){
      selection = new Set([id]);
      renderAll();
    }
    const z = zoneById(id);
    const members = state.nodes.filter(n => inZone(n, z)).map(n => ({n, ox:n.x - wp.x, oy:n.y - wp.y}));
    drag = {kind:"zmove", z, ox:z.x - wp.x, oy:z.y - wp.y, members, moved:false};
    svg.setPointerCapture(e.pointerId);
    return;
  }

  // empty canvas → marquee (select tool) or deselect
  if(tool === "select"){
    drag = {kind:"marquee", x0:wp.x, y0:wp.y, x1:wp.x, y1:wp.y, add:e.shiftKey};
    svg.setPointerCapture(e.pointerId);
  }
  if(!e.shiftKey && selection.size){ selection.clear(); renderAll(); }
});

window.addEventListener("pointermove", e => {
  if(pendingFrom){
    const src = nodeById(pendingFrom);
    if(src) drawTempEdge(src, toWorld(e.clientX, e.clientY));
    return;
  }
  if(!drag) return;
  const wp = toWorld(e.clientX, e.clientY);

  if(drag.kind === "pan"){
    view.x = drag.vx + (e.clientX - drag.sx);
    view.y = drag.vy + (e.clientY - drag.sy);
    applyView();
  }
  else if(drag.kind === "move"){
    drag.moved = true;
    let snappedLane = null;
    for(const p of drag.parts){
      const ls = laneSnapPoint(snap(wp.x + p.ox), snap(wp.y + p.oy));
      p.n.x = ls.x; p.n.y = ls.y;
      if(ls.lane && !snappedLane) snappedLane = ls.lane;
    }
    renderAll();
    tempLayer.innerHTML = "";
    if(snappedLane){
      tempLayer.appendChild(el("rect", {x:snappedLane.x, y:snappedLane.y, width:snappedLane.w, height:snappedLane.h,
        fill:snappedLane.color, "fill-opacity":.05, stroke:snappedLane.color, "stroke-opacity":.45,
        "stroke-width":1.2, "stroke-dasharray":"5 4", "pointer-events":"none"}));
    }
  }
  else if(drag.kind === "link"){
    const src = nodeById(drag.from);
    if(src) drawTempEdge(src, wp);
    const over = nodeUnderPointer(e);
    markLinkTarget(over && over !== drag.from ? over : null);
  }
  else if(drag.kind === "zmove"){
    drag.moved = true;
    drag.z.x = snap(wp.x + drag.ox); drag.z.y = snap(wp.y + drag.oy);
    for(const p of drag.members){ p.n.x = snap(wp.x + p.ox); p.n.y = snap(wp.y + p.oy); }
    renderAll();
  }
  else if(drag.kind === "zresize"){
    drag.moved = true;
    const x1 = snap(wp.x), y1 = snap(wp.y);
    drag.z.x = Math.min(drag.fx, x1); drag.z.y = Math.min(drag.fy, y1);
    drag.z.w = Math.max(90, Math.abs(x1 - drag.fx));
    drag.z.h = Math.max(70, Math.abs(y1 - drag.fy));
    renderAll();
  }
  else if(drag.kind === "zdraw"){
    drag.x1 = wp.x; drag.y1 = wp.y;
    uiLayer.innerHTML = "";
    const x = Math.min(drag.x0, drag.x1), y = Math.min(drag.y0, drag.y1);
    const w = Math.abs(drag.x1 - drag.x0), h = Math.abs(drag.y1 - drag.y0);
    uiLayer.appendChild(el("rect", {x, y, width:w, height:h, rx:16, fill:"#435ef1", "fill-opacity":.05,
      stroke:"#435ef1", "stroke-opacity":.6, "stroke-width":1.4, "stroke-dasharray":"10 7",
      "vector-effect":"non-scaling-stroke"}));
  }
  else if(drag.kind === "marquee"){
    drag.x1 = wp.x; drag.y1 = wp.y;
    uiLayer.innerHTML = "";
    const x = Math.min(drag.x0, drag.x1), y = Math.min(drag.y0, drag.y1);
    const w = Math.abs(drag.x1 - drag.x0), h = Math.abs(drag.y1 - drag.y0);
    uiLayer.appendChild(el("rect", {x, y, width:w, height:h, rx:4, fill:"#435ef1", "fill-opacity":.07,
      stroke:"#435ef1", "stroke-opacity":.5, "stroke-width":1, "vector-effect":"non-scaling-stroke"}));
  }
});

window.addEventListener("pointerup", e => {
  if(!drag) return;
  const d = drag; drag = null;
  svg.classList.remove("panning");

  if(d.kind === "move" || d.kind === "zmove" || d.kind === "zresize"){
    if(d.kind === "move") tempLayer.innerHTML = "";
    if(d.moved) commit();
  }
  else if(d.kind === "zdraw"){
    uiLayer.innerHTML = "";
    const x = Math.min(d.x0, d.x1), y = Math.min(d.y0, d.y1);
    const w = Math.abs(d.x1 - d.x0), h = Math.abs(d.y1 - d.y0);
    if(w > 50 && h > 40){
      const color = ZONE_COLORS[state.zones.length % ZONE_COLORS.length];
      const z = d.lane
        ? {id:uid("z"), x:snap(x), y:snap(y), w:snap(Math.max(w, 320)), h:snap(Math.max(h, 220)),
           label:"Process", color, kind:"swimlane", orient:"h", lanes:["Lane 1","Lane 2","Lane 3"]}
        : {id:uid("z"), x:snap(x), y:snap(y), w:snap(w), h:snap(h), label:"Zone", color};
      state.zones.push(z);
      commit();
      selection = new Set([z.id]);
      setTool("select");
      renderAll();
      openEditor({kind:"zone", id:z.id});
    }
  }
  else if(d.kind === "link"){
    const over = nodeUnderPointer(e);
    clearTemp();
    if(over && over !== d.from){
      addEdge(d.from, over);
    } else if(d.clickClick && Math.hypot(e.clientX - d.sx, e.clientY - d.sy) < 6){
      // simple click in connect mode → arm click-click linking
      pendingFrom = d.from;
      const src = nodeById(pendingFrom);
      if(src) drawTempEdge(src, toWorld(e.clientX, e.clientY));
    } else {
      renderAll();
    }
  }
  else if(d.kind === "marquee"){
    uiLayer.innerHTML = "";
    const x0 = Math.min(d.x0, d.x1), x1 = Math.max(d.x0, d.x1);
    const y0 = Math.min(d.y0, d.y1), y1 = Math.max(d.y0, d.y1);
    if(x1 - x0 > 4 || y1 - y0 > 4){
      const hits = state.nodes.filter(n =>
        n.x + NW/2 > x0 && n.x - NW/2 < x1 && n.y + NH/2 > y0 && n.y - NH/2 < y1).map(n => n.id);
      if(!d.add) selection.clear();
      hits.forEach(id => selection.add(id));
      renderAll();
    }
  }
});

/* ---------- wheel zoom ---------- */
svg.addEventListener("wheel", e => {
  e.preventDefault();
  const f = Math.exp(-e.deltaY * 0.0013);
  const k2 = clamp(view.k * f, 0.15, 3.5);
  const r = svg.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  view.x = mx - (mx - view.x) * (k2 / view.k);
  view.y = my - (my - view.y) * (k2 / view.k);
  view.k = k2;
  applyView();
}, {passive:false});

function zoomBy(f){
  const r = svg.getBoundingClientRect();
  const mx = r.width/2, my = r.height/2;
  const k2 = clamp(view.k * f, 0.15, 3.5);
  view.x = mx - (mx - view.x) * (k2 / view.k);
  view.y = my - (my - view.y) * (k2 / view.k);
  view.k = k2;
  applyView();
}
function contentBounds(){
  if(!state.nodes.length && !state.zones.length) return null;
  let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
  for(const n of state.nodes){
    const hw = nodeW(n)/2, hh = nodeH(n)/2;
    x0 = Math.min(x0, n.x - hw); x1 = Math.max(x1, n.x + hw);
    y0 = Math.min(y0, n.y - hh); y1 = Math.max(y1, n.y + hh);
  }
  for(const z of state.zones){
    x0 = Math.min(x0, z.x); x1 = Math.max(x1, z.x + z.w);
    y0 = Math.min(y0, z.y - 14); y1 = Math.max(y1, z.y + z.h);   // -14: zone label tag sits above the border
  }
  return {x0, y0, x1, y1};
}
function zoomFit(){
  const b = contentBounds();
  if(!b){ view = {x:0, y:0, k:1}; applyView(); return; }
  if(svg.getBoundingClientRect().width < 10){ requestAnimationFrame(zoomFit); return; }
  const pad = 90;
  const bx0 = b.x0 - pad, bx1 = b.x1 + pad;
  const by0 = b.y0 - pad, by1 = b.y1 + pad;
  const r = svg.getBoundingClientRect();
  const k = clamp(Math.min(r.width / (bx1 - bx0), r.height / (by1 - by0)), 0.15, 1.6);
  view.k = k;
  view.x = (r.width - (bx0 + bx1) * k) / 2;
  view.y = (r.height - (by0 + by1) * k) / 2;
  applyView();
}

/* ---------- double-click renaming ---------- */
svg.addEventListener("dblclick", e => {
  const nodeG = e.target.closest ? e.target.closest("g[data-node]") : null;
  const edgeG = e.target.closest ? e.target.closest("g[data-edge]") : null;
  if(nodeG) openEditor({kind:"node", id:nodeG.getAttribute("data-node")});
  else if(edgeG) openEditor({kind:"edge", id:edgeG.getAttribute("data-edge")});
});
function openEditor(target){
  editTarget = target;
  let sp, val;
  if(target.kind === "node"){
    const n = nodeById(target.id); if(!n) return;
    sp = TYPES[n.type].shape ? toScreen(n.x, n.y) : toScreen(n.x, n.y - nodeH(n)/2 + 56);
    val = n.label;
  } else if(target.kind === "zone"){
    const z = zoneById(target.id); if(!z) return;
    sp = z.kind === "swimlane"
      ? toScreen(z.x + z.w/2, z.y + 13)
      : toScreen(z.x + 14 + (z.label.length * 6.6 + 22)/2, z.y);
    val = z.label;
  } else if(target.kind === "lane"){
    const z = zoneById(target.id); if(!z || !z.lanes || !z.lanes[target.lane]) return;
    const n = z.lanes.length, i = target.lane;
    sp = z.orient !== "v"
      ? toScreen(z.x + 70, z.y + LANE_TITLE_H + (i + 0.5) * (z.h - LANE_TITLE_H) / n)
      : toScreen(z.x + (i + 0.5) * z.w / n, z.y + LANE_TITLE_H + 11);
    val = z.lanes[i];
  } else {
    const ed = edgeById(target.id); if(!ed) return;
    const a = nodeById(ed.a), b = nodeById(ed.b); if(!a || !b) return;
    const m = edgeGeom(a, b).mid;
    sp = toScreen(m.x, m.y); val = ed.label;
  }
  labelEditor.style.display = "block";
  labelEditor.style.left = (sp.x - 75) + "px";
  labelEditor.style.top = (sp.y - 14) + "px";
  labelEditor.value = val;
  // defer focus: the pointerdown that triggered this will move focus as its default action
  setTimeout(() => { if(editTarget){ labelEditor.focus(); labelEditor.select(); } }, 0);
}
function commitEditor(){
  if(!editTarget) return;
  const v = labelEditor.value.trim();
  if(editTarget.kind === "node"){ const n = nodeById(editTarget.id); if(n && n.label !== v && v){ n.label = v; commit(); } }
  else if(editTarget.kind === "zone"){ const z = zoneById(editTarget.id); if(z && z.label !== v && v){ z.label = v; commit(); } }
  else if(editTarget.kind === "lane"){
    const z = zoneById(editTarget.id);
    if(z && z.lanes && z.lanes[editTarget.lane] !== undefined && v && z.lanes[editTarget.lane] !== v){ z.lanes[editTarget.lane] = v; commit(); }
  }
  else { const ed = edgeById(editTarget.id); if(ed && ed.label !== v){ ed.label = v; commit(); } }
  hideEditor(); renderAll();
}
function hideEditor(){ editTarget = null; labelEditor.style.display = "none"; }
labelEditor.addEventListener("keydown", e => {
  e.stopPropagation();
  if(e.key === "Enter") commitEditor();
  if(e.key === "Escape") hideEditor();
});
labelEditor.addEventListener("blur", commitEditor);

/* ---------- properties panel ---------- */
function updateProps(){
  if(journeyOpen || present){ propsEl.style.display = "none"; return; }
  if(selection.size !== 1){ propsEl.style.display = "none"; return; }
  const id = [...selection][0];
  const n = nodeById(id), ed = edgeById(id), z = zoneById(id);
  const wireText = (sel, fn) => {

/* ---------- keyboard ---------- */
window.addEventListener("keydown", e => {
  if(e.target === labelEditor || e.target.tagName === "INPUT" || e.target.tagName === "SELECT" || e.target.tagName === "TEXTAREA") return;
  if(present){
    if(e.key === "ArrowRight" || e.key === " " || e.code === "Space"){ pjNext(); e.preventDefault(); }
    else if(e.key === "ArrowLeft"){ pjPrev(); e.preventDefault(); }
    else if(e.key === "Escape"){ exitPresent(); }
    return;
  }
  if(e.code === "Space"){ spaceDown = true; if(!drag) svg.classList.add("panning"); e.preventDefault(); return; }
  const mod = e.ctrlKey || e.metaKey;
  if(mod && e.key.toLowerCase() === "z" && !e.shiftKey){ undo(); e.preventDefault(); }
  else if((mod && e.key.toLowerCase() === "y") || (mod && e.shiftKey && e.key.toLowerCase() === "z")){ redo(); e.preventDefault(); }
  else if(mod && e.key.toLowerCase() === "d"){ duplicateSelection(); e.preventDefault(); }
  else if(mod && e.key.toLowerCase() === "a"){ selection = new Set([...state.nodes.map(n => n.id), ...state.edges.map(x => x.id), ...state.zones.map(x => x.id)]); renderAll(); e.preventDefault(); }
  else if(mod && e.key.toLowerCase() === "s"){ exportJSON(); e.preventDefault(); }
  else if(e.key === "Delete" || e.key === "Backspace"){ deleteSelection(); }
  else if(e.key === "Escape"){
    if($("recModal").classList.contains("open")){ $("recModal").classList.remove("open"); return; }
    pendingFrom = null; clearTemp(); selection.clear(); renderAll();
  }
  else if(e.key.toLowerCase() === "v") setTool("select");
  else if(e.key.toLowerCase() === "c" && !mod) setTool("connect");
  else if(e.key.toLowerCase() === "z" && !mod) setTool("zone");
  else if(e.key.toLowerCase() === "l") setTool("lane");
  else if(e.key.toLowerCase() === "h") setTool("pan");
  else if(e.key.toLowerCase() === "f") zoomFit();
  else if(e.key === "+" || e.key === "=") zoomBy(1.2);
  else if(e.key === "-") zoomBy(1/1.2);
});
window.addEventListener("keyup", e => {
  if(e.code === "Space"){ spaceDown = false; if(!drag) svg.classList.remove("panning"); }
});

}

const FONT_STACK = "ui-sans-serif, system-ui, 'Segoe UI', Roboto, sans-serif";
/* Clone the diagram layers, strip editor-only UI, and (if t is given) bake the
   CSS animation state at time t into attributes so rasterized frames animate. */
function cloneLayerMarkup(layer, t){
  const c = layer.cloneNode(true);
  c.querySelectorAll(".ports, .zhandle").forEach(x => x.remove());
  if(t != null){
    const haloOp = (0.22 + 0.63 * (0.5 - 0.5 * Math.cos(2 * Math.PI * t / 1.6))).toFixed(3);
    c.querySelectorAll(".fxhalo").forEach(x => x.setAttribute("stroke-opacity", haloOp));
    c.querySelectorAll(".vis.anim").forEach(x => x.setAttribute("stroke-dashoffset", (-(35 * t) % 28).toFixed(2)));
    c.querySelectorAll(".footsteps").forEach(x => sneakStep(x, t));   // bake footprint walk at frame time
  }
  return c.outerHTML;
}
function buildDiagramSVG(t){
  const b = contentBounds();
  if(!b) return null;
  const pad = 70;
  const x0 = b.x0 - pad, y0 = b.y0 - pad;
  const w = Math.round(b.x1 + pad - x0), h = Math.round(b.y1 + pad - y0);
  const defs = svg.querySelector("defs").outerHTML;
  const out = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="${x0} ${y0} ${w} ${h}" font-family="${FONT_STACK}">
${defs}
<rect x="${x0}" y="${y0}" width="${w}" height="${h}" fill="#0b1120"/>
${cloneLayerMarkup(zonesLayer, t)}
${cloneLayerMarkup(edgesLayer, t)}
${cloneLayerMarkup(nodesLayer, t)}
</svg>`;
  return {out, w, h};
}

function svgToImage(svgStr){
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(new Blob([svgStr], {type:"image/svg+xml"}));
    const img = new Image();
    img.onload = () => { URL.revokeObjectURL(url); res(img); };
    img.onerror = e => { URL.revokeObjectURL(url); rej(e); };

function exportPNG(){

/* ---------- animated GIF export ---------- */
/* Median-cut colour quantization → 256-colour palette */
function medianCut(samples, nColors){
  const makeBox = pts => {
    let mn = [255,255,255], mx = [0,0,0];
    for(const p of pts) for(let c = 0; c < 3; c++){
      if(p[c] < mn[c]) mn[c] = p[c];
      if(p[c] > mx[c]) mx[c] = p[c];
    }
    const ranges = [mx[0]-mn[0], mx[1]-mn[1], mx[2]-mn[2]];
    const ch = ranges.indexOf(Math.max(...ranges));
    return {pts, ch, range:ranges[ch]};
  };
  const boxes = [makeBox(samples)];
  while(boxes.length < nColors){
    let bi = -1, best = 0;
    for(let i = 0; i < boxes.length; i++)
      if(boxes[i].range > best && boxes[i].pts.length > 1){ best = boxes[i].range; bi = i; }
    if(bi < 0) break;
    const box = boxes.splice(bi, 1)[0];
    box.pts.sort((a, b) => a[box.ch] - b[box.ch]);
    const mid = box.pts.length >> 1;
    boxes.push(makeBox(box.pts.slice(0, mid)), makeBox(box.pts.slice(mid)));
  }
  return boxes.map(box => {
    let r = 0, g = 0, b = 0;
    for(const p of box.pts){ r += p[0]; g += p[1]; b += p[2]; }
    const L = box.pts.length || 1;
    return [Math.round(r/L), Math.round(g/L), Math.round(b/L)];
  });
}
/* GIF-flavoured LZW */
function gifLZW(minCodeSize, pixels){
  const CLEAR = 1 << minCodeSize, EOI = CLEAR + 1;
  let dict, next, codeSize;
  const reset = () => { dict = new Map(); next = EOI + 1; codeSize = minCodeSize + 1; };
  const out = [];
  let acc = 0, nbits = 0;
  const write = code => {
    acc |= code << nbits; nbits += codeSize;
    while(nbits >= 8){ out.push(acc & 255); acc >>>= 8; nbits -= 8; }
  };
  reset();
  write(CLEAR);
  let prev = pixels[0];
  for(let i = 1; i < pixels.length; i++){
    const c = pixels[i];
    const key = (prev << 8) | c;
    const hit = dict.get(key);
    if(hit !== undefined){ prev = hit; continue; }
    write(prev);
    if(next < 4096){
      dict.set(key, next++);
      if(next === (1 << codeSize) + 1 && codeSize < 12) codeSize++;
    } else {
      write(CLEAR); reset();
    }
    prev = c;
  }
  write(prev); write(EOI);
  if(nbits > 0) out.push(acc & 255);
  return out;
}
function gifAssemble(W, H, palette, indexFrames, delayCS){
  const out = [];
  const str = s => { for(let i = 0; i < s.length; i++) out.push(s.charCodeAt(i)); };
  const u16 = v => { out.push(v & 255, (v >> 8) & 255); };
  str("GIF89a"); u16(W); u16(H); out.push(0xF7, 0, 0);
  for(let i = 0; i < 256; i++){ const p = palette[i] || [0,0,0]; out.push(p[0], p[1], p[2]); }
  out.push(0x21, 0xFF, 11); str("NETSCAPE2.0"); out.push(3, 1); u16(0); out.push(0);  // loop forever
  for(const f of indexFrames){
    out.push(0x21, 0xF9, 4, 0x04); u16(delayCS); out.push(0, 0);   // GCE: keep previous frame
    out.push(0x2C); u16(0); u16(0); u16(W); u16(H); out.push(0);   // image descriptor
    out.push(8);                                                    // LZW min code size
    const data = gifLZW(8, f);
    for(let i = 0; i < data.length; i += 255){
      const chunk = data.slice(i, i + 255);
      out.push(chunk.length, ...chunk);
    }
    out.push(0);
  }
  out.push(0x3B);
  return new Uint8Array(out);
}
const tick = () => new Promise(r => setTimeout(r, 0));
let gifBusy = false;
async function exportGIF(){
  if(gifBusy) return;
  if(!contentBounds()){ toast("Nothing to export — canvas is empty"); return; }
  gifBusy = true; $("btnGIF").disabled = true;
  try{
    // 20 frames × 80 ms = one seamless 1.6 s animation loop
    const FRAMES = 20, DELAY = 8;
    const savedSel = selection;
    selection = new Set(); renderAll();
    const probe = buildDiagramSVG(0);
    const scale = Math.min(1, 960 / probe.w);
    const W = Math.max(1, Math.round(probe.w * scale)), H = Math.max(1, Math.round(probe.h * scale));
    const cnv = document.createElement("canvas");
    cnv.width = W; cnv.height = H;
    const ctx = cnv.getContext("2d", {willReadFrequently:true});
    const rgbaFrames = [];
    for(let i = 0; i < FRAMES; i++){
      toast(`Rendering GIF… frame ${i + 1}/${FRAMES}`);
      const img = await svgToImage(buildDiagramSVG(i * DELAY / 100).out);
      ctx.drawImage(img, 0, 0, W, H);
      rgbaFrames.push(ctx.getImageData(0, 0, W, H).data);
      await tick();
    }
    selection = savedSel; renderAll();
    toast("Encoding GIF… building palette");
    await tick();
    const samples = [];
    for(const fi of [0, 10]){
      const d = rgbaFrames[fi];
      for(let i = 0; i < d.length; i += 28) samples.push([d[i], d[i+1], d[i+2]]);
    }
    const palette = medianCut(samples, 256);
    const cache = new Map();
    const nearest = (r, g, b) => {
      const key = (r << 16) | (g << 8) | b;
      let idx = cache.get(key);
      if(idx !== undefined) return idx;
      let bd = Infinity;
      for(let i = 0; i < palette.length; i++){
        const p = palette[i];
        const d = (r-p[0])*(r-p[0]) + (g-p[1])*(g-p[1]) + (b-p[2])*(b-p[2]);
        if(d < bd){ bd = d; idx = i; }
      }
      cache.set(key, idx);
      return idx;
    };
    const indexFrames = [];
    for(let fi = 0; fi < rgbaFrames.length; fi++){
      toast(`Encoding GIF… frame ${fi + 1}/${FRAMES}`);
      const d = rgbaFrames[fi];
      const idx = new Uint8Array(W * H);
      for(let i = 0, px = 0; i < d.length; i += 4, px++) idx[px] = nearest(d[i], d[i+1], d[i+2]);
      indexFrames.push(idx);
      await tick();
    }
    const bytes = gifAssemble(W, H, palette, indexFrames, DELAY);
    download("network-diagram.gif", new Blob([bytes], {type:"image/gif"}));
    toast(`GIF exported (${W}×${H}, ${FRAMES} frames, loops forever)`);
  }catch(err){
    toast("GIF export failed: " + err.message);
  }finally{
    gifBusy = false; $("btnGIF").disabled = false;
  }
}
