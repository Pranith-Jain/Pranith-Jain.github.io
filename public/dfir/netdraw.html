   av:['video/mp4;codecs="avc1.42E01E,mp4a.40.2"', "video/mp4;codecs=avc1.42E01E,mp4a.40.2",
       "video/mp4;codecs=avc1,mp4a.40.2", "video/mp4"],
   v:['video/mp4;codecs="avc1.42E01E"', "video/mp4;codecs=avc1.42E01E", "video/mp4;codecs=avc1", "video/mp4"]},
  {name:"MP4 — AV1", ext:"mp4",
   av:["video/mp4;codecs=av01.0.04M.08,opus", "video/mp4;codecs=av01.0.04M.08,mp4a.40.2"],
   v:["video/mp4;codecs=av01.0.04M.08"]}
];
function detectRecFormats(){
  if(typeof MediaRecorder === "undefined") return [];
  return REC_FORMATS.map(f => {
    const v = f.v.find(m => MediaRecorder.isTypeSupported(m));
    if(!v) return null;
    const av = f.av.find(m => MediaRecorder.isTypeSupported(m)) || v;
    return {name:f.name, ext:f.ext, av, v};
  }).filter(Boolean);
}
let lastRecFormat = 0;   // remember the user's last choice within the session
function populateRecFormats(){
  const box = $("recFormats");
  const fmts = detectRecFormats();
  if(!fmts.length){
    box.innerHTML = `<p class="mnote">This browser does not support video recording.</p>`;
    return fmts;
  }
  if(lastRecFormat >= fmts.length) lastRecFormat = 0;
  box.innerHTML = fmts.map((f, i) =>
    `<label class="mopt"><input type="radio" name="recFormat" value="${i}" ${i === lastRecFormat ? "checked" : ""}>
      ${f.name} <span class="mdim">.${f.ext}</span></label>`).join("");
  return fmts;
}
let rec = null;
async function startRecording(audioMode, musicFile, fmt){
  const wrap = $("canvasWrap");
  const cssW = wrap.clientWidth, cssH = wrap.clientHeight;
  const pxScale = Math.min(1.5, window.devicePixelRatio || 1);
  const physW = Math.round(cssW * pxScale), physH = Math.round(cssH * pxScale);
  const cnv = document.createElement("canvas");
  cnv.width = physW; cnv.height = physH;
  const ctx = cnv.getContext("2d");
  const videoStream = cnv.captureStream(30);
  const tracks = [...videoStream.getVideoTracks()];
  let audioCleanup = () => {};
  if(audioMode === "mic"){
    try{
      const mic = await navigator.mediaDevices.getUserMedia({audio:true});
      tracks.push(...mic.getAudioTracks());
      audioCleanup = () => mic.getTracks().forEach(t => t.stop());
    }catch(err){ toast("Microphone unavailable (" + err.name + ") — recording without audio"); }
  } else if(audioMode === "music" && musicFile){
    try{
      const actx = new AudioContext();
      const audioEl = new Audio(URL.createObjectURL(musicFile));
      audioEl.loop = true;
      const src = actx.createMediaElementSource(audioEl);
      const dest = actx.createMediaStreamDestination();
      src.connect(dest);
      src.connect(actx.destination);   // audible while recording
      await audioEl.play();
      tracks.push(...dest.stream.getAudioTracks());
      audioCleanup = () => { audioEl.pause(); URL.revokeObjectURL(audioEl.src); actx.close(); };
    }catch(err){ toast("Could not play music file — recording without audio"); }
  }
  if(!fmt) fmt = detectRecFormats()[0];
  if(!fmt){ toast("This browser does not support video recording"); return; }
  const hasAudio = tracks.some(t => t.kind === "audio");
  const mime = hasAudio ? fmt.av : fmt.v;
  const mr = new MediaRecorder(new MediaStream(tracks), {mimeType:mime, videoBitsPerSecond:6e6});
  const chunks = [];
  mr.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
  mr.onstop = () => {
    download("network-diagram-recording." + fmt.ext, new Blob(chunks, {type:mime.split(";")[0]}));
    toast(`Recording saved (.${fmt.ext})`);
  };
  const t0 = performance.now();
  let running = true, building = false, lastImg = null, drawCount = 0;
  async function pump(){
    if(building || !running) return;
    building = true;
    try{ lastImg = await svgToImage(buildLiveFrameSVG(cssW, cssH, physW, physH, (performance.now() - t0) / 1000)); }
    catch(_){}
    building = false;
  }
  // setInterval (not rAF): keeps capturing even when the tab loses focus/visibility
  const drawTimer = setInterval(() => {
    if(!running) return;
    if(lastImg){ ctx.drawImage(lastImg, 0, 0, physW, physH); drawCount++; }
    pump();
  }, 33);
  pump();
  mr.start(250);
  const btn = $("btnRec");
  btn.classList.add("recon");
  const timer = setInterval(() => {
    const s = Math.floor((performance.now() - t0) / 1000);
    btn.querySelector("span").textContent = `Stop ${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
  }, 500);
  btn.querySelector("span").textContent = "Stop 0:00";
  toast("Recording… pan, zoom and present. Click Stop when done.");
  rec = {
    get frames(){ return drawCount; },
    stop(){
      running = false;
      clearInterval(timer);
      clearInterval(drawTimer);
      audioCleanup();
      mr.stop();
      videoStream.getTracks().forEach(t => t.stop());
      btn.classList.remove("recon");
      btn.querySelector("span").textContent = "Rec";
    }
  };
}
function stopRecording(){ if(rec){ rec.stop(); rec = null; } }

function exportJSON(){
  download("network-diagram.json", new Blob([JSON.stringify(state, null, 2)], {type:"application/json"}));
  toast("Diagram saved as JSON");
}
function applyLoadedDoc(doc){
  if(!doc || !Array.isArray(doc.nodes) || !Array.isArray(doc.edges)) throw 0;
  if(doc.nodes.some(n => !TYPES[n.type])) throw 0;
  if(present) exitPresent();
  state = {nodes:doc.nodes, edges:doc.edges, zones:Array.isArray(doc.zones) ? doc.zones : [],
    journey: (doc.journey && Array.isArray(doc.journey.steps)) ? doc.journey : {steps:[]}};
  selection.clear();
  commit();
  renderAll();
  zoomFit();
}
function importJSON(file){
  const rd = new FileReader();
  rd.onload = () => {
    try{ applyLoadedDoc(JSON.parse(rd.result)); toast("Diagram loaded"); }
    catch(_){ toast("Could not read that file — not a NetDraw JSON"); }
  };
  rd.readAsText(file);
}

  {file:"rhysida-killchain-journey.json", name:"Rhysida ransomware kill chain", tag:"journey"},
  {file:"stuxnet-journey.json",           name:"Stuxnet attack chain",          tag:"journey"},

function buildExamplesMenu(){
  const m = $("examplesMenu");
  m.innerHTML = EXAMPLES.map(e =>
    `<button class="exitem" data-file="${e.file}">${esc(e.name)}${e.tag ? `<span class="extag">${e.tag}</span>` : ""}</button>`).join("");
  m.querySelectorAll(".exitem").forEach(b => b.onclick = () => { closeExamplesMenu(); loadExample(b.dataset.file); });
}
function openExamplesMenu(){ buildExamplesMenu(); $("examplesMenu").style.display = "block"; $("btnExamples").classList.add("active"); }
function closeExamplesMenu(){ $("examplesMenu").style.display = "none"; $("btnExamples").classList.remove("active"); }
async function loadExample(file){
  try{
    const resp = await fetch("https://mr-r3b00t.github.io/net_draw/examples/" + file, {cache:"no-cache"});
    if(!resp.ok) throw 0;
    applyLoadedDoc(await resp.json());
    const meta = EXAMPLES.find(e => e.file === file);
    toast("Loaded: " + (meta ? meta.name : file));
  }catch(_){
    toast("Couldn't load example — serve the folder over http, or use Open to pick the file");
  }
}

$("btnRec").onclick = () => {
  if(rec){ stopRecording(); return; }
  populateRecFormats();
  $("recModal").classList.add("open");
};
$("recCancel").onclick = () => $("recModal").classList.remove("open");
$("recStart").onclick = () => {
  const mode = document.querySelector('input[name="recAudio"]:checked').value;
  const file = $("recMusic").files[0] || null;
  if(mode === "music" && !file){ toast("Pick a music file first (or choose another audio option)"); return; }
  const fmts = detectRecFormats();
  if(!fmts.length){ toast("This browser does not support video recording"); return; }
  const pick = document.querySelector('input[name="recFormat"]:checked');
  lastRecFormat = pick ? Math.min(+pick.value, fmts.length - 1) : 0;
  $("recModal").classList.remove("open");
  startRecording(mode, file, fmts[lastRecFormat]);
};
$("btnJSON").onclick = exportJSON;
$("btnOpen").onclick = () => $("fileInput").click();
$("fileInput").addEventListener("change", e => { if(e.target.files[0]) importJSON(e.target.files[0]); e.target.value = ""; });
$("btnExamples").onclick = e => { e.stopPropagation(); $("examplesMenu").style.display === "block" ? closeExamplesMenu() : openExamplesMenu(); };
document.addEventListener("pointerdown", e => { const t = e.target; if(t && t.closest && !t.closest(".menuwrap")) closeExamplesMenu(); }, true);
$("btnClear").onclick = () => {
  if(!state.nodes.length && !state.edges.length && !state.zones.length) return;
  if(confirm("Clear the entire canvas? (You can still undo.)")){
    state = {nodes:[], edges:[], zones:[], journey:{steps:[]}};
    selection.clear();
    commit();
    renderAll();
  }
};

/* ---------- boot ---------- */
function boot(){
  buildPalette();
  let restoredView = null;
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){
      const doc = JSON.parse(raw);
      if(doc.state && Array.isArray(doc.state.nodes)){ state = doc.state; restoredView = doc.view; }
    }
  }catch(_){}
  if(!Array.isArray(state.zones)) state.zones = [];   // migrate pre-zones saves
  if(!state.journey || !Array.isArray(state.journey.steps)) state.journey = {steps:[]};   // migrate pre-journey saves
  if(!state.nodes.length) state = sampleState();
  lastSnap = serialize();
  renderAll();
  if(restoredView && restoredView.k){ view = restoredView; applyView(); }
  else requestAnimationFrame(zoomFit);
  setTool("select");
}
boot();
