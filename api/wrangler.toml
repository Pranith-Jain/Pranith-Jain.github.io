# !! TEST-ONLY — NOT used for deployment !!
# This file exists solely to configure the @cloudflare/vitest-pool-workers test runtime.
# The production Worker is deployed from the repo root via wrangler.jsonc.
name = "pranithjain-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# Test runtime only. The external-read API-key gate (auth.ts) is a PRODUCTION
# behavior; the SELF.fetch route tests predate it and exercise handlers as
# public reads, so restore keyless reads here. Prod (wrangler.jsonc) does NOT
# set this, so production reads stay gated. The gate itself is covered by a
# dedicated unit test (test/lib/auth-gate.test.ts).
OPEN_PUBLIC_READS = "true"

# NOTE: id "test-only-not-deployed" is a placeholder. The vitest-pool-workers
# test pool uses in-memory KV regardless. Real production id gets set when
# Plan 1 Task 5 (deferred — Cloudflare provisioning) is completed.
[[kv_namespaces]]
binding = "KV_CACHE"
id = "test-only-not-deployed"

[[d1_databases]]
binding = "BRIEFINGS_DB"
database_name = "pranithjain-briefings"
database_id = "1ef56666-b41c-4d20-9bd4-841b4d214be8"
