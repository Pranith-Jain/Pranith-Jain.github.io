    <!-- Self-hosted fonts (latin + latin-ext subset, generated by
         scripts/fetch-fonts.mjs). Same-origin, so no third-party request leaks
         the visitor's IP to Google and no cross-origin preconnect/round-trip is
         needed; font-display: swap (in fonts.css) covers FOIT. Type system:
         Bricolage Grotesque (display), Hanken Grotesk (body), JetBrains Mono
         (IOC / terminal data).
         Loaded asynchronously via media="print" → onload swaps to "all" so the
         font CSS doesn't block the initial render. The swap is safe because
         font-display: swap already shows system fonts until the custom fonts
         load, so there is no flash-of-unstyled-text regression. -->
    <link rel="stylesheet" href="/fonts/fonts.css" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="/fonts/fonts.css" /></noscript>

    <!-- Theme detection script - runs before page render to prevent flash -->
    <script>
      (function() {
        try {
          const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          // Fail silently if localStorage is not available (e.g., private browsing)
          console.warn('Theme detection failed:', e);
        }
      })();
    </script>

  <!-- No `overflow-x-hidden` on body: it creates a scroll containing
       block at document level, which breaks mobile pinch-zoom panning
       (user can zoom in but can't pan past the original viewport
       edge to see clipped content). Both Layout.tsx (portfolio routes)
       and AppShell.tsx (/dfir, /threatintel) already use `overflow-x-clip`
       on their inner wrappers to contain decorative blobs without
       creating a scroll context; the body-level rule was redundant. -->
  <body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-50 transition-colors duration-300 motion-reduce:transition-none overscroll-y-none">
