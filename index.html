    <!-- Site-wide structured data (SEO/AEO audit fixes 1 + 2)
         A single top-level Person schema so AI engines can attribute
         the work to a known identity, and a WebSite + SearchAction
         schema so Google can render a sitelinks search box and
         ChatGPT/Perplexity understand the site as one product
         surface (not 350 disconnected pages). Per-page JSON-LD
         (SoftwareApplication on /dfir and /threatintel, Article on
         /projects/:slug, FAQPage on /, /dfir, /threatintel, /radar)
         continues to render alongside this. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "@id": "https://pranithjain.qzz.io/#person",
      "name": "Pranith Jain",

      ],

        "https://github.com/Pranith-Jain",
        "https://x.com/Npj8448"
      ]
    }
    </script>

    <!-- Self-hosted fonts (latin + latin-ext subset, generated by
         scripts/fetch-fonts.mjs). Same-origin, so no third-party request leaks
         the visitor's IP to Google and no cross-origin preconnect/round-trip is
         needed; font-display: swap (in fonts.css) covers FOIT. Type system:
         Bricolage Grotesque (display), Hanken Grotesk (body), JetBrains Mono
         (IOC / terminal data).
         Loaded eagerly (media="all") — self-hosted fonts are fast, and
         font-display: swap already shows system fonts until the custom fonts
         load, so there is no flash-of-unstyled-text regression. The previous
         media="print" → onload swap required an inline event handler which
         conflicted with CSP nonce-based script-src (unsafe-inline alongside
         a nonce nullifies the nonce). -->
    <link rel="stylesheet" href="/fonts/fonts.css" media="all" />
    <noscript><link rel="stylesheet" href="/fonts/fonts.css" /></noscript>

    <!-- Theme detection script - runs before page render to prevent flash -->
    <script>
      (function () {
        try {
          const theme =
            localStorage.getItem('theme') ||
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          // Fail silently if localStorage is not available (e.g., private browsing)
          console.warn('Theme detection failed:', e);
        }
      })();
    </script>

  <!-- No `overflow-x-hidden` on body: it creates a scroll containing
       block at document level, which breaks mobile pinch-zoom panning
       (user can zoom in but can't pan past the original viewport
       edge to see clipped content). Both Layout.tsx (portfolio routes)
       and AppShell.tsx (/dfir, /threatintel) already use `overflow-x-clip`
       on their inner wrappers to contain decorative blobs without
       creating a scroll context; the body-level rule was redundant. -->

         `html.dark body` rule in index.css via the --bg-base/--bg-glow
         tokens, so it stays in one place rather than a hardcoded hex here. -->
