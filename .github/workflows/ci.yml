name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Run independently per PR so a slow run doesn't block a faster one.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Each job runs the same checkout + setup (cached npm install dominates the
  # cold cost), but splitting them parallelises lint / typecheck / test and
  # makes a failing step obvious in the PR status block. The cost is one
  # extra setup per job (~10-15s with the cache hot).
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # Zero-warning baseline: the codebase is currently clean (0 eslint
      # warnings across ~894 files after the no-explicit-any cleanup + the
      # hexagonal refactor). --max-warnings 0 keeps it that way — any new
      # warning fails CI. If a deliberate, hard-to-avoid warning is added,
      # raise this to that exact count (with a note) rather than leaving slack.
      - name: Lint (zero-warning baseline)
        run: npx eslint . --ext ts,tsx --report-unused-disable-directives --max-warnings 0

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # Two compilation units (root SPA + api/ worker). Run both — they catch
      # different things (root checks JSX + DOM types; api checks Workers /
      # Hono types under stricter `noUncheckedIndexedAccess`).
      - name: tsc (root)
        run: npx tsc --noEmit -p tsconfig.json
      # tsc (api) needs api/ deps — api/tsconfig.json references the
      # @cloudflare/vitest-pool-workers type defs, which root npm ci doesn't install.
      - name: install api deps
        working-directory: api
        run: npm ci --legacy-peer-deps
      - name: tsc (api)
        run: npx tsc --noEmit -p api/tsconfig.json
      # tsc (worker) — worker/ is in no other tsconfig. This config extends
      # api/tsconfig and adds ../worker, so it reuses the api/ deps installed
      # above and holds worker code to the same strictness as api (issue #89).
      - name: tsc (worker)
        run: npx tsc --noEmit -p api/tsconfig.worker.json

  test-root:
    name: Vitest + script tests (root)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # Node:test suites for the data-pipeline scripts (mcp-manifest parser,
      # cert-in diff). These are unit tests for scripts that have no test
      # files in the vitest suite — they live under scripts/*.test.mjs and
      # are run as plain node --test.
      - name: Script unit tests
        run: npm run test:scripts
      - run: npm run test:run

  coverage:
    name: Coverage gate (protected surfaces)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # Verifies every protected lib (rule-convert, detection-engine, etc.)
      # has at least one test file and meets its per-module coverage
      # threshold. Falls back to a "test-exists" check if the coverage
      # provider is not installed.
      - name: Check protected-surface coverage
        run: node scripts/check-coverage.mjs
      # Upload the full coverage report as a CI artifact so a human can
      # drill into any regression. The job itself only fails on threshold
      # breaches; the artifact is informational.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  test-api:
    name: Vitest (api lib + case-study)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # api/ has its own package.json + lockfile; @cloudflare/vitest-pool-workers
      # (used by api/vitest.config.ts) lives there, not in root deps. Install it
      # explicitly — root `npm ci` does not cover api/. --legacy-peer-deps because
      # npm ci in api/ does not read the repo-root .npmrc.
      - name: install api deps
        working-directory: api
        run: npm ci --legacy-peer-deps
      # The api suite runs under @cloudflare/vitest-pool-workers (miniflare).
      # Route tests that need outbound DNS/TCP can flake under the pool's
      # concurrency model (EADDRNOTAVAIL when many tests connect at once);
      # we run the deterministic lib + case-study subset here. Route tests
      # remain runnable locally via `cd api && npx vitest run test/routes`.
      - name: api vitest (lib + case-study + health)
        working-directory: api
        run: npx vitest run test/lib test/case-study test/health.test.ts

  build:
    name: Build + budget check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build client
        run: npm run build:client
      - name: Budget check
        run: node scripts/check-budgets.mjs
