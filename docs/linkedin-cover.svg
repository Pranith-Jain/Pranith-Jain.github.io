<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396" font-family="'Hanken Grotesk', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/><stop offset="50%" stop-color="#12121a"/><stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2c3ee5" stop-opacity="0.15"/><stop offset="100%" stop-color="#2c3ee5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#e11d48" stop-opacity="0.12"/><stop offset="100%" stop-color="#e11d48" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a78f2"/><stop offset="100%" stop-color="#2c3ee5"/>
    </linearGradient>
  </defs>

  <rect width="1584" height="396" fill="url(#bg)"/>
  <rect width="1584" height="396" fill="url(#grid)"/>
  <rect width="1584" height="396" fill="url(#glow1)"/>
  <rect width="1584" height="396" fill="url(#glow2)"/>

  <!-- left accent bar -->
  <rect x="0" y="0" width="4" height="396" fill="url(#bar)"/>

  <!-- PJ mark — matches PjMark.tsx exactly -->
  <rect x="60" y="140" width="72" height="72" rx="4" fill="#2c3ee5"/>
  <text x="96" y="184" text-anchor="middle" dominant-baseline="central" font-size="28" font-weight="800" font-family="Arial, sans-serif" fill="#ffffff">PJ</text>

  <!-- name + title -->
  <text x="152" y="168" font-size="36" font-weight="800" letter-spacing="0.5" fill="#ffffff">PRANITH JAIN</text>
  <text x="152" y="200" font-size="14" font-weight="700" letter-spacing="3" fill="#a1b6fb">SECURITY ANALYST · DETECTION ENGINEER</text>

  <!-- tagline -->
  <text x="60" y="268" font-size="24" font-weight="600" fill="#cbd5e1">Building at the intersection of AI, threat intelligence,</text>
  <text x="60" y="300" font-size="24" font-weight="600" fill="#a1b6fb">and edge-native security tooling.</text>

  <!-- stats -->
  <text x="60" y="360" font-size="18" font-weight="700" fill="#94a3b8">
    <tspan fill="#a1b6fb">90+</tspan> intel sources  ·  
    <tspan fill="#a1b6fb">60+</tspan> DFIR tools  ·  
    <tspan fill="#a1b6fb">30+</tspan> live feeds  ·  
    <tspan fill="#a1b6fb">pranithjain.qzz.io</tspan>
  </text>

  <!-- right side: subtle scan rings -->
  <g stroke="#5a78f2" fill="none" opacity="0.12">
    <circle cx="1400" cy="198" r="80" stroke-width="1"/>
    <circle cx="1400" cy="198" r="140" stroke-width="1"/>
    <circle cx="1400" cy="198" r="200" stroke-width="1"/>
  </g>
  <circle cx="1400" cy="198" r="4" fill="#5a78f2" opacity="0.4"/>
</svg>
