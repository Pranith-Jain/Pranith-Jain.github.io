<?xml version="1.0" encoding="UTF-8"?>
<!-- LinkedIn cover banner (1584×396) for Pranith Jain — LIGHT theme.
     Same composition + brand language as the dark variant; contrast flipped
     for a clean light surface (white→indigo-tinted gradient, slate-900 hero,
     brand-600 accents). Avatar/mobile-crop safe (centered, balanced). -->
<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396" font-family="'Hanken Grotesk', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e2e8f7"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="20%" r="62%">
      <stop offset="0%" stop-color="#5a78f2" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#5a78f2" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#5a78f2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2c3ee5"/>
      <stop offset="100%" stop-color="#5a78f2"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a78f2"/>
      <stop offset="100%" stop-color="#2c3ee5"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#2c3ee5" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Backdrop -->
  <rect width="1584" height="396" fill="url(#bg)"/>
  <rect width="1584" height="396" fill="url(#grid)"/>
  <rect width="1584" height="396" fill="url(#glow)"/>

  <!-- Decorative concentric "scan ring" motif (right side, crop-safe) -->
  <g stroke="#2c3ee5" fill="none">
    <circle cx="1410" cy="198" r="60" stroke-opacity="0.16" stroke-width="1.5"/>
    <circle cx="1410" cy="198" r="104" stroke-opacity="0.10" stroke-width="1.5"/>
    <circle cx="1410" cy="198" r="150" stroke-opacity="0.06" stroke-width="1.5"/>
  </g>
  <circle cx="1410" cy="198" r="4" fill="#0ea5e9"/>
  <circle cx="1462" cy="160" r="3.5" fill="#f43f5e"/>
  <circle cx="1356" cy="246" r="3.5" fill="#f59e0b"/>

  <!-- Left brand accent bar -->
  <rect x="0" y="0" width="6" height="396" fill="url(#bar)"/>

  <!-- Eyebrow: name + role -->
  <text x="792" y="74" text-anchor="middle" font-size="15.5" font-weight="700" letter-spacing="4" fill="#2c3ee5">PRANITH JAIN  ·  THREAT INTELLIGENCE · DFIR · DETECTION ENGINEERING</text>

  <!-- Hero: the portfolio headline (verbatim brand voice) -->
  <text x="792" y="152" text-anchor="middle" font-size="46" font-weight="800" letter-spacing="0.3" fill="#0f172a">Building at the intersection of AI,</text>
  <text x="792" y="210" text-anchor="middle" font-size="46" font-weight="800" letter-spacing="0.3" fill="#2c3ee5">threat intel &amp; edge-native security tooling.</text>

  <!-- Proof strip (credibility numbers from the portfolio) -->
  <text x="792" y="262" text-anchor="middle" font-size="20" font-weight="400" fill="#475569">90+ threat-intel sources  ·  60+ DFIR tools across 11 categories</text>

  <!-- CTA pill: proof + URL -->
  <g transform="translate(792, 330)">
    <rect x="-336" y="-23" width="672" height="46" rx="23" fill="#ffffff" fill-opacity="0.7" stroke="#2c3ee5" stroke-opacity="0.30" stroke-width="1.5"/>
    <text x="0" y="7" text-anchor="middle" font-size="17" font-weight="700" letter-spacing="0.5" fill="#334155">live IOC &amp; breach feeds  ·  STIX/TAXII export  ·  <tspan fill="#2c3ee5" font-weight="800">pranithjain.qzz.io</tspan></text>
  </g>
</svg>
